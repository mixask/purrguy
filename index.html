<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Applekour Community</title>
    <style>
        body { 
            margin: 0; 
            background-color: #000; 
            color: #fff; 
            font-family: 'Inter', sans-serif; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh;
            position: relative;
        }

        .main-container {
            width: 100%;
            max-width: 700px;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        .video-box {
            width: 100%;
            padding-top: 56.25%;
            position: relative;
            border-radius: 24px;
            overflow: hidden;
            background: #0a0a0a;
            margin-bottom: 30px;
        }

        .video-box iframe {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%; border: none;
        }

        .submit-section {
            width: 100%;
            max-width: 380px;
            text-align: center;
        }

        h1 { font-size: 2.2rem; margin-bottom: 5px; }
        p { color: #555; margin-bottom: 25px; font-size: 0.9rem; }

        .inputs { display: flex; flex-direction: column; gap: 10px; }
        
        input {
            background: #111;
            border: 1px solid #222;
            color: #fff;
            padding: 14px;
            border-radius: 12px;
            font-size: 0.9rem;
        }

        /* Стиль для выбора файла */
        input[type="file"] {
            cursor: pointer;
            font-size: 0.8rem;
            border: 1px dashed #444;
        }

        button {
            background: #fff;
            color: #000;
            border: none;
            padding: 16px;
            border-radius: 12px;
            font-weight: 800;
            cursor: pointer;
            margin-top: 10px;
            transition: 0.3s;
        }

        button:hover { background: #ddd; transform: translateY(-2px); }

        /* Твой ник справа снизу */
        .watermark {
            position: fixed;
            bottom: 20px;
            right: 25px;
            color: #333; /* Неяркий цвет, чтобы не отвлекал */
            font-size: 0.8rem;
            font-family: monospace;
            letter-spacing: 1px;
            user-select: none;
        }
    </style>
</head>
<body>

    <div class="main-container">
        <div class="video-box">
            <iframe src="https://streamable.com/e/dosqic?autoplay=1&muted=1&nocontrols=1" allow="autoplay"></iframe>
        </div>

        <div class="submit-section">
            <h1>APPLEKOUR</h1>
            <p>Upload your trick or provide a link</p>
            
            <div class="inputs">
                <input type="text" id="nick" placeholder="In-game Nickname">
                <input type="text" id="discord" placeholder="Discord Link / ID">
                <input type="text" id="clip_link" placeholder="Link (Optional)">
                <input type="file" id="clip_file" accept="video/*">
                
                <button onclick="sendToDiscord()">Submit Trick</button>
            </div>
        </div>
    </div>

    <div class="watermark">mikk319</div>

    <script>
        const WEBHOOK_URL = "ТВОЙ_ВЕБХУК_URL";

        async function sendToDiscord() {
            const nick = document.getElementById('nick').value;
            const disc = document.getElementById('discord').value;
            const link = document.getElementById('clip_link').value;
            const fileInput = document.getElementById('clip_file');
            const file = fileInput.files[0];

            if(!nick || !disc) return alert("Please fill Name and Discord!");
            if(!link && !file) return alert("Please provide a link or a file!");

            const formData = new FormData();
            
            // Если есть файл, добавляем его в FormData
            if (file) {
                formData.append("file", file);
            }

            // Настройка сообщения (Payload)
            const payload = {
                content: `🚀 **New Clip!**\n**Nick:** ${nick}\n**Discord:** ${disc}\n**Link:** ${link || 'Uploaded as file'}`
            };

            formData.append("payload_json", JSON.stringify(payload));

            try {
                const response = await fetch(WEBHOOK_URL, {
                    method: 'POST',
                    body: formData
                });

                if (response.ok) {
                    alert("Clip successfully sent!");
                    // Сброс формы
                    document.getElementById('clip_file').value = "";
                } else {
                    alert("Error sending. Check file size (Discord limit).");
                }
            } catch (err) {
                alert("Connection error.");
            }
        }
    </script>
</body>
</html>
