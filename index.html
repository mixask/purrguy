<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MonkeyCode | Final Edition</title>
    <style>
        :root {
            --bg-color: #323437;
            --main-color: #e2b714;
            --sub-color: #646669;
            --text-color: #d1d0c5;
            --error-color: #ca4754;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Fira Code', monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            transition: opacity 0.3s;
        }

        /* Config Bar */
        .config-bar {
            display: flex;
            gap: 30px;
            color: var(--sub-color);
            margin-bottom: 50px;
            font-size: 14px;
            background: rgba(0,0,0,0.1);
            padding: 10px 25px;
            border-radius: 10px;
            user-select: none;
        }

        .config-group { display: flex; gap: 12px; align-items: center; }
        .config-group b { color: var(--main-color); font-weight: normal; }
        .opt { cursor: pointer; transition: 0.2s; }
        .opt:hover, .opt.active { color: var(--text-color); }
        .opt.active { color: var(--main-color); }

        /* Test Area */
        #test-container {
            width: 85%;
            max-width: 1000px;
            position: relative;
        }

        #display-text {
            font-size: 24px;
            line-height: 1.5;
            color: var(--sub-color);
            white-space: pre-wrap;
            word-break: break-all;
        }

        .letter { position: relative; border-left: 2px solid transparent; }
        .letter.active { border-left-color: var(--main-color); animation: blink 1s infinite; }
        .letter.correct { color: var(--text-color); }
        .letter.incorrect { color: var(--error-color); }
        
        #hidden-input {
            position: absolute;
            top: 0; left: 0;
            opacity: 0;
            pointer-events: none;
        }

        /* Results Display */
        #results-screen { display: none; text-align: left; animation: fadeIn 0.5s ease; }
        .stat-val { font-size: 5rem; color: var(--main-color); margin: 0; line-height: 1; }
        .stat-label { color: var(--sub-color); font-size: 1.2rem; margin-bottom: 30px; }

        .btn-row { display: flex; gap: 15px; margin-top: 40px; }
        .btn {
            background: none;
            border: 1px solid var(--sub-color);
            color: var(--sub-color);
            padding: 12px 24px;
            border-radius: 6px;
            cursor: pointer;
            font-family: inherit;
            font-weight: bold;
        }
        .btn:hover { background: var(--text-color); color: var(--bg-color); border-color: var(--text-color); }

        @keyframes blink { 50% { border-left-color: transparent; } }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div class="config-bar" id="menu">
        <div class="config-group" id="lang-menu">
            <b>type</b>
            <span class="opt active" data-lang="en">english</span>
            <span class="opt" data-lang="ru">russian</span>
            <span class="opt" data-lang="js">javascript</span>
            <span class="opt" data-lang="lua">lua</span>
        </div>
        <div class="config-group" id="line-menu">
            <b>amount</b>
            <span class="opt" data-val="15">15</span>
            <span class="opt active" data-val="20">20</span>
            <span class="opt" data-val="30">30</span>
        </div>
        <div class="config-group" id="time-menu">
            <b>time</b>
            <span class="opt" data-time="15">15</span>
            <span class="opt" data-time="30">30</span>
            <span class="opt active" data-time="60">60</span>
            <span class="opt" data-time="120">120</span>
        </div>
    </div>

    <div id="test-container">
        <div id="timer-live" style="color: var(--main-color); font-size: 1.5rem; margin-bottom: 10px; visibility: hidden;">60</div>
        <textarea id="hidden-input" spellcheck="false" autocomplete="off"></textarea>
        <div id="display-text"></div>
    </div>

    <div id="results-screen">
        <p class="stat-label">wpm</p>
        <h1 class="stat-val" id="res-wpm">0</h1>
        <p class="stat-label">accuracy</p>
        <h1 class="stat-val" id="res-acc" style="font-size: 2.5rem;">0%</h1>
        
        <div class="btn-row">
            <button class="btn" onclick="location.reload()">restart test</button>
            <button class="btn" onclick="saveAsTxt()">save results</button>
        </div>
    </div>

<script>
    const contentPool = {
        en: ["The sun sets behind the mountains.", "Coding is the art of logical thinking.", "Practice makes perfect in every craft."],
        ru: ["Программирование — это искусство.", "Быстрая бурая лиса прыгает через собаку.", "Москва — столица нашей родины."],
        js: ["function start() {\n\treturn true;\n}", "const items = [1, 2, 3];", "if (active) {\n\tconsole.log('run');\n}"],
        lua: ["local x = 5\nprint(x * 10)", "if player.health == 0 then\n\tdie()\nend", "for i=1, #list do\n\tprint(i)\nend"]
    };

    let activeLang = 'en', lineCount = 20, maxTime = 60, timeLeft = 60;
    let timer = null, isStarted = false, charIndex = 0, mistakes = 0;

    const display = document.getElementById('display-text');
    const input = document.getElementById('hidden-input');
    const timerLive = document.getElementById('timer-live');

    function setupTest() {
        display.innerHTML = '';
        input.value = '';
        charIndex = 0;
        mistakes = 0;
        timeLeft = maxTime;
        timerLive.innerText = timeLeft;
        timerLive.style.visibility = 'hidden';
        
        let rawContent = "";
        for(let i=0; i < lineCount; i++) {
            let pool = contentPool[activeLang];
            rawContent += pool[Math.floor(Math.random() * pool.length)] + (activeLang.length > 2 ? "\n" : " ");
        }

        rawContent.split('').forEach((char, i) => {
            const span = document.createElement('span');
            if (char === '\n') span.innerHTML = '↵\n';
            else if (char === '\t') span.innerHTML = '&nbsp;&nbsp;&nbsp;&nbsp;';
            else span.innerText = char;
            span.classList.add('letter');
            if(i === 0) span.classList.add('active');
            display.appendChild(span);
        });
    }

    input.addEventListener('keydown', (e) => {
        if (e.key === 'Tab') {
            e.preventDefault();
            input.value += "\t";
            handleInput();
        }
    });

    input.addEventListener('input', handleInput);

    function handleInput() {
        if (!isStarted) startTimer();
        
        const chars = display.querySelectorAll('.letter');
        if (input.value.length < charIndex) {
            chars[charIndex].classList.remove('active', 'correct', 'incorrect');
            charIndex--;
            chars[charIndex].classList.add('active');
            chars[charIndex].classList.remove('correct', 'incorrect');
            return;
        }

        const currentChar = chars[charIndex];
        const lastTyped = input.value[charIndex];
        const expected = currentChar.innerText.includes('↵') ? '\n' : (currentChar.innerText === '' ? '\t' : currentChar.innerText);

        currentChar.classList.remove('active');
        if (lastTyped === expected) currentChar.classList.add('correct');
        else { currentChar.classList.add('incorrect'); mistakes++; }

        charIndex++;
        if (chars[charIndex]) chars[charIndex].classList.add('active');
        else endTest();
    }

    function startTimer() {
        isStarted = true;
        timerLive.style.visibility = 'visible';
        timer = setInterval(() => {
            timeLeft--;
            timerLive.innerText = timeLeft;
            if (timeLeft <= 0) endTest();
        }, 1000);
    }

    function endTest() {
        clearInterval(timer);
        input.disabled = true;
        
        const timeSpent = maxTime - timeLeft;
        const wpm = Math.round((charIndex / 5) / (timeSpent / 60)) || 0;
        const acc = charIndex > 0 ? Math.round(((charIndex - mistakes) / charIndex) * 100) : 0;

        document.getElementById('menu').style.display = 'none';
        document.getElementById('test-container').style.display = 'none';
        document.getElementById('results-screen').style.display = 'block';
        
        document.getElementById('res-wpm').innerText = wpm;
        document.getElementById('res-acc').innerText = acc + "%";
    }

    function saveAsTxt() {
        const text = `MonkeyCode\nWPM: ${document.getElementById('res-wpm').innerText}\nAcc: ${document.getElementById('res-acc').innerText}`;
        const blob = new Blob([text], {type: 'text/plain'});
        const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
        a.download = 'score.txt'; a.click();
    }

    document.querySelectorAll('.opt').forEach(opt => {
        opt.onclick = () => {
            const group = opt.parentElement;
            group.querySelectorAll('.opt').forEach(o => o.classList.remove('active'));
            opt.classList.add('active');
            
            if(group.id === 'lang-menu') activeLang = opt.dataset.lang;
            if(group.id === 'line-menu') lineCount = parseInt(opt.dataset.val);
            if(group.id === 'time-menu') {
                maxTime = parseInt(opt.dataset.time);
                timeLeft = maxTime;
            }
            setupTest();
        };
    });

    document.addEventListener('click', () => input.focus());
    setupTest();
</script>
</body>
</html>
