<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro Code Typer</title>
    <style>
        :root { --bg: #0d1117; --card: #161b22; --text: #c9d1d9; --accent: #58a6ff; --error: #f85149; }
        body { font-family: 'Segoe UI', monospace; background: var(--bg); color: var(--text); display: flex; flex-direction: column; align-items: center; padding: 40px; }
        .container { max-width: 800px; width: 100%; background: var(--card); padding: 30px; border-radius: 12px; border: 1px solid #30363d; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        #display { background: #000; padding: 20px; border-radius: 6px; white-space: pre; overflow-x: auto; font-family: 'Consolas', monospace; font-size: 14px; line-height: 1.6; margin: 20px 0; border-left: 4px solid var(--accent); color: #8b949e; }
        textarea { width: 100%; height: 120px; background: #0d1117; color: white; border: 1px solid #30363d; padding: 15px; border-radius: 6px; font-family: monospace; font-size: 16px; resize: none; outline: none; transition: border 0.3s; }
        textarea:focus { border-color: var(--accent); }
        textarea:disabled { background: #21262d; cursor: not-allowed; opacity: 0.6; }
        .stats-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .btn { background: var(--accent); color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-weight: bold; }
        .btn:hover { opacity: 0.9; }
        select { background: #21262d; color: white; border: 1px solid #30363d; padding: 5px 10px; border-radius: 4px; }
    </style>
</head>
<body>

<div class="container" id="main-test">
    <div class="stats-bar">
        <div>
            Lines: 
            <select id="line-select">
                <option value="15">15 Lines</option>
                <option value="20">20 Lines</option>
                <option value="30">30 Lines</option>
            </select>
        </div>
        <div id="timer" style="font-size: 1.5rem; color: var(--accent);">Time: 60s</div>
        <button class="btn" onclick="resetTest()">Reset</button>
    </div>

    <div id="display">Generating code...</div>
    <textarea id="typing-input" placeholder="Start typing to begin..."></textarea>
</div>

<div class="container" id="results-page" style="display:none; text-align: center;">
    <h1 style="color: var(--accent);">Test Complete!</h1>
    <div style="font-size: 3rem; margin: 20px 0;" id="wpm-display">0 WPM</div>
    <p id="accuracy-display">Accuracy: 0%</p>
    <div style="display: flex; gap: 10px; justify-content: center; margin-top: 30px;">
        <button class="btn" onclick="location.reload()">Try Again</button>
        <button class="btn" style="background: #238636;" onclick="saveAsText()">Save Result (.txt)</button>
    </div>
</div>

<script>
    const codeSnippets = [
        "const app = express();", "for(let i=0; i<data.length; i++)", "return JSON.stringify(results);",
        "import { useEffect } from 'react';", "async function fetchData() {", "const [state, setState] = useState(null);",
        "console.error('Error connecting to DB');", "process.env.PORT || 3000;", "git commit -m 'Fixed typing bug';",
        "npm install lucide-react", "<div>{items.map(item => <li>{item}</li>)}</div>", "export const config = { runtime: 'edge' };",
        "const result = await db.user.findMany();", "const theme = localStorage.getItem('theme');", "if(!res.ok) throw new Error();"
    ];

    let timer;
    let timeLeft = 60;
    let isStarted = false;
    let finalWpm = 0;

    const input = document.getElementById('typing-input');
    const display = document.getElementById('display');
    const timerText = document.getElementById('timer');
    const lineSelect = document.getElementById('line-select');

    function generateCode() {
        const linesRequested = parseInt(lineSelect.value);
        let output = "";
        for (let i = 0; i < linesRequested; i++) {
            const randomLine = codeSnippets[Math.floor(Math.random() * codeSnippets.length)];
            output += `${(i + 1).toString().padStart(2, '0')}  ${randomLine}\n`;
        }
        display.innerText = output;
    }

    function startTimer() {
        if (isStarted) return;
        isStarted = true;
        timer = setInterval(() => {
            timeLeft--;
            timerText.innerText = `Time: ${timeLeft}s`;
            if (timeLeft <= 0) finishTest();
        }, 1000);
    }

    function finishTest() {
        clearInterval(timer);
        input.disabled = true; // FIX: Prevents typing after time ends
        
        // Calculate Stats
        const wordsTyped = input.value.trim().split(/\s+/).length;
        finalWpm = Math.max(0, Math.round(wordsTyped / (60 / 60)));
        
        // Redirect logic simulation (Switching views)
        showResults();
    }

    function showResults() {
        document.getElementById('main-test').style.display = 'none';
        document.getElementById('results-page').style.display = 'block';
        document.getElementById('wpm-display').innerText = `${finalWpm} WPM`;
        
        // Simple accuracy logic
        const rawText = display.innerText.replace(/\d+\s+/g, ''); // strip line numbers
        const typedText = input.value;
        document.getElementById('accuracy-display').innerText = `Lines Selected: ${lineSelect.value}`;
    }

    function saveAsText() {
        const content = `--- Typing Test Results ---\nWPM: ${finalWpm}\nLines: ${lineSelect.value}\nDate: ${new Date().toLocaleString()}`;
        const blob = new Blob([content], { type: 'text/plain' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `typing-result-${finalWpm}wpm.txt`;
        a.click();
    }

    function resetTest() {
        clearInterval(timer);
        isStarted = false;
        timeLeft = 60;
        input.value = "";
        input.disabled = false;
        timerText.innerText = "Time: 60s";
        generateCode();
    }

    input.addEventListener('input', startTimer);
    lineSelect.addEventListener('change', resetTest);

    // Init
    generateCode();
</script>

</body>
</html>
