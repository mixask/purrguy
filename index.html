<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Misha's Code Speedtest</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0a0a;
            --purple: #D9CCFF;
            --teal: #B6FFE9;
            --gray: #333;
            --error: #ff6060;
        }

        body {
            background-color: var(--bg);
            color: white;
            font-family: 'JetBrains Mono', monospace;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        /* Top Bar & Stats */
        .header {
            width: 80%;
            margin-top: 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(217, 204, 255, 0.1);
            padding-bottom: 10px;
        }

        .stats { display: flex; gap: 40px; }
        .stat-box { display: flex; flex-direction: column; }
        .stat-label { font-size: 10px; color: var(--purple); text-transform: uppercase; }
        .stat-val { font-size: 24px; color: var(--teal); font-weight: bold; }

        /* Settings Menu */
        .settings-bar {
            background: rgba(255, 255, 255, 0.03);
            padding: 10px 30px;
            border-radius: 50px;
            margin-top: 20px;
            display: flex;
            gap: 20px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.05);
        }

        .setting-group { display: flex; align-items: center; gap: 8px; font-size: 12px; color: #777; }
        select, input {
            background: none; border: none; color: var(--purple);
            font-family: inherit; font-size: 14px; cursor: pointer; outline: none;
        }

        /* Typing Area */
        #typing-container {
            width: 80%;
            margin-top: 40px;
            position: relative;
            font-size: 22px;
            line-height: 1.5;
            color: var(--gray);
            white-space: pre-wrap;
            word-break: break-all;
            height: 50vh;
            overflow-y: auto;
        }

        .char { position: relative; }
        .correct { color: var(--teal); }
        .incorrect { color: var(--error); background: rgba(255, 96, 96, 0.2); }
        .current { border-left: 2px solid var(--teal); animation: blink 1s infinite; }

        @keyframes blink { 50% { border-color: transparent; } }
        #hidden-input { position: absolute; opacity: 0; pointer-events: none; }

        /* Progress Bar */
        #progress {
            position: fixed; top: 0; left: 0;
            height: 3px; background: var(--teal);
            box-shadow: 0 0 10px var(--teal);
            transition: 0.1s; width: 0%;
        }

        .restart-hint { margin-top: 30px; color: #444; font-size: 12px; }
    </style>
</head>
<body>

    <div id="progress"></div>

    <div class="header">
        <div class="stats">
            <div class="stat-box"><span class="stat-label">WPM</span><span id="wpm" class="stat-val">0</span></div>
            <div class="stat-box"><span class="stat-label">Accuracy</span><span id="acc" class="stat-val">100%</span></div>
            <div class="stat-box"><span class="stat-label">Time</span><span id="timer" class="stat-val">0s</span></div>
        </div>
        <div style="font-weight: bold; letter-spacing: 2px; color: var(--purple);">MISHA_TYPE.v2</div>
    </div>

    <div class="settings-bar">
        <div class="setting-group">Language: 
            <select id="lang" onchange="init()">
                <option value="lua">Lua</option>
                <option value="js">JavaScript</option>
                <option value="python">Python</option>
            </select>
        </div>
        <div class="setting-group">Lines: 
            <select id="lines" onchange="init()">
                <option value="5">5</option>
                <option value="15">15</option>
                <option value="30">30</option>
            </select>
        </div>
        <div class="setting-group">Limit: 
            <input type="number" id="time-limit" value="60" style="width: 40px;">s
        </div>
    </div>

    <div id="typing-container" onclick="focusInput()">
        <div id="display"></div>
        <input type="text" id="hidden-input" autocomplete="off" spellcheck="false">
    </div>

    <div class="restart-hint">Press <b>ESC</b> to restart | <b>TAB</b> to indent</div>

    <script>
        // REPLACE THESE WITH YOUR FULL 7.6k CODES
        const library = {
            lua: `function onTouched(hit)\n\tlocal hum = hit.Parent:FindFirstChild("Humanoid")\n\tif hum then\n\t\thum.Health = 0\n\tend\nend`,
            js: `const calculateWPM = (chars, time) => {\n\tconst words = chars / 5;\n\treturn Math.round(words / time);\n};`,
            python: `def move_part(position):\n\tpart.Position = Vector3.new(position)\n\tprint("Moved to " + position)`
        };

        let activeCode = "";
        let currentIndex = 0;
        let startTime = null;
        let timerInterval = null;

        const display = document.getElementById('display');
        const input = document.getElementById('hidden-input');

        function init() {
            clearInterval(timerInterval);
            const raw = library[document.getElementById('lang').value];
            const lineCount = parseInt(document.getElementById('lines').value);
            
            // Randomize: take a random chunk of lines if possible
            const lines = raw.split('\n');
            const start = Math.floor(Math.random() * Math.max(1, lines.length - lineCount));
            activeCode = lines.slice(start, start + lineCount).join('\n');

            currentIndex = 0;
            startTime = null;
            input.value = "";
            document.getElementById('wpm').innerText = "0";
            document.getElementById('acc').innerText = "100%";
            document.getElementById('timer').innerText = "0s";
            document.getElementById('progress').style.width = "0%";
            
            render();
            input.focus();
        }

        function render() {
            display.innerHTML = "";
            activeCode.split('').forEach((char, i) => {
                const span = document.createElement('span');
                span.innerText = char;
                span.className = 'char' + (i === 0 ? ' current' : '');
                display.appendChild(span);
            });
        }

        function focusInput() { input.focus(); }

        window.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') init();
            if (e.key === 'Tab' && document.activeElement === input) {
                e.preventDefault(); // Prevents jumping out of browser
                if (activeCode[currentIndex] === '\t') {
                    input.value += '\t';
                    handleInput();
                }
            }
        });

        input.addEventListener('input', handleInput);

        function handleInput() {
            if (!startTime && input.value.length > 0) {
                startTime = Date.now();
                startTimer();
            }

            const val = input.value;
            currentIndex = val.length;
            const spans = display.querySelectorAll('span');
            let errs = 0;

            spans.forEach((span, i) => {
                span.className = 'char';
                if (i < val.length) {
                    if (val[i] === activeCode[i]) span.classList.add('correct');
                    else { span.classList.add('incorrect'); errs++; }
                }
                if (i === currentIndex) span.classList.add('current');
            });

            // Math Logic
            const timeElapsed = (Date.now() - startTime) / 60000;
            if (timeElapsed > 0 && currentIndex > 5) {
                const wpm = Math.round((currentIndex / 5) / timeElapsed);
                document.getElementById('wpm').innerText = Math.min(wpm, 500);
                const acc = Math.round(((currentIndex - errs) / currentIndex) * 100);
                document.getElementById('acc').innerText = acc + "%";
            }

            document.getElementById('progress').style.width = (currentIndex / activeCode.length * 100) + "%";

            if (val.length >= activeCode.length) finish();
        }

        function startTimer() {
            const limit = parseInt(document.getElementById('time-limit').value);
            timerInterval = setInterval(() => {
                const elapsed = Math.floor((Date.now() - startTime) / 1000);
                document.getElementById('timer').innerText = elapsed + "s";
                if (elapsed >= limit) finish();
            }, 1000);
        }

        function finish() {
            clearInterval(timerInterval);
            alert("Test Complete! Final WPM: " + document.getElementById('wpm').innerText);
            init();
        }

        init();
    </script>
</body>
</html>
