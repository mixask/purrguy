<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro Code Speedtest</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --purple: #D9CCFF;
            --teal: #B6FFE9;
            --trans: 0.2s ease;
        }

        [data-theme="dark"] {
            --bg: #0a0a0a;
            --text: #ffffff;
            --subtext: #444;
            --card: rgba(255, 255, 255, 0.07);
            --mix-color: rgba(182, 255, 233, 0.1);
            --dropdown-bg: #1a1a1a;
        }

        [data-theme="light"] {
            --bg: #ffffff;
            --text: #1a1a1a;
            --subtext: #aaa;
            --card: rgba(0, 0, 0, 0.05);
            --mix-color: rgba(217, 204, 255, 0.2);
            --dropdown-bg: #f0f0f0;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'JetBrains Mono', monospace;
            margin: 0; display: flex; flex-direction: column; align-items: center; height: 100vh; overflow: hidden;
        }

        /* Fixed Dropdown Selection Bug */
        select {
            background: var(--card);
            border: 1px solid var(--mix-color);
            color: var(--text);
            padding: 8px 15px;
            border-radius: 8px;
            cursor: pointer;
            outline: none;
            font-family: inherit;
        }

        select option {
            background-color: var(--dropdown-bg);
            color: var(--text);
            padding: 10px;
        }

        /* Header & Stats */
        .header { width: 85%; margin-top: 30px; display: flex; justify-content: space-between; align-items: center; }
        .stats-grid { display: flex; gap: 30px; }
        .label { font-size: 10px; color: var(--purple); text-transform: uppercase; display: block; }
        .val { font-size: 24px; color: var(--teal); font-weight: bold; }

        /* Typing Area */
        #container {
            width: 85%; margin-top: 40px; font-size: 20px; line-height: 1.6;
            color: var(--subtext); white-space: pre-wrap; height: 50vh;
            overflow-y: auto; position: relative; padding: 20px;
            background: rgba(0,0,0,0.02); border-radius: 15px;
        }

        .correct { color: var(--teal); transition: color 0.1s; }
        .incorrect { color: #ff6060; background: rgba(255, 0, 0, 0.15); border-radius: 2px; }
        .current { border-left: 2px solid var(--teal); animation: blink 1s infinite; }
        @keyframes blink { 50% { border-color: transparent; } }

        /* Fancy In-App Result Tab */
        #result-modal {
            display: none; position: fixed; top: 50%; left: 50%;
            transform: translate(-50%, -50%); background: var(--bg);
            padding: 40px; border-radius: 20px; border: 2px solid var(--teal);
            box-shadow: 0 0 50px rgba(0,0,0,0.8); text-align: center; z-index: 1000;
        }

        #progress { position: fixed; top: 0; left: 0; height: 4px; background: var(--teal); width: 0%; box-shadow: 0 0 10px var(--teal); }
        #hidden-input { position: absolute; opacity: 0; pointer-events: none; }
        .btn { background: var(--teal); color: #000; padding: 12px 30px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 20px; }
    </style>
</head>
<body>

    <div id="progress"></div>

    <div class="header">
        <div class="stats-grid">
            <div><span class="label">WPM</span><span id="wpm" class="val">0</span></div>
            <div><span class="label">Acc</span><span id="acc" class="val">100%</span></div>
            <div><span class="label">Time</span><span id="timer" class="val">0s</span></div>
        </div>
        <button onclick="toggleTheme()" style="background:none; border:none; font-size: 24px; cursor:pointer;">🌓</button>
    </div>

    <div style="margin-top: 20px; display: flex; gap: 15px;">
        <select id="lang" onchange="init()">
            <option value="lua">Lua (Roblox)</option>
            <option value="cpp">C++</option>
            <option value="cs">C#</option>
            <option value="java">Java</option>
            <option value="py">Python</option>
        </select>
        <select id="line-count" onchange="init()">
            <option value="5">5 Lines</option>
            <option value="15">15 Lines</option>
            <option value="25">Full Script</option>
        </select>
    </div>

    <div id="container" onclick="focusInput()">
        <div id="display"></div>
        <input type="text" id="hidden-input" autocomplete="off" spellcheck="false">
    </div>

    <div id="result-modal">
        <h2 style="color:var(--purple)">Test Finished!</h2>
        <div id="final-stats" style="font-size: 24px; margin: 20px 0;"></div>
        <button class="btn" onclick="init()">Try Again (Esc)</button>
    </div>

    <script>
        const library = {
            lua: `local TweenService = game:GetService("TweenService")\nlocal part = script.Parent\nlocal info = TweenInfo.new(2, Enum.EasingStyle.Sine)\nlocal goal = {Size = Vector3.new(10, 10, 10)}\nlocal tween = TweenService:Create(part, info, goal)\ntween:Play()\nprint("Tween Started!")`,
            cpp: `#include <iostream>\n#include <vector>\nint main() {\n\tstd::vector<int> scores = {95, 88, 72};\n\tfor(int s : scores) {\n\t\tstd::cout << "Score: " << s << std::endl;\n\t}\n\treturn 0;\n}`,
            cs: `using UnityEngine;\npublic class PlayerController : MonoBehaviour {\n\tpublic float speed = 10f;\n\tvoid Update() {\n\t\tfloat move = Input.GetAxis("Horizontal") * speed * Time.deltaTime;\n\t\ttransform.Translate(move, 0, 0);\n\t}\n}`,
            java: `import java.util.Scanner;\npublic class App {\n\tpublic static void main(String[] args) {\n\t\tSystem.out.println("Enter Name: ");\n\t\tScanner input = new Scanner(System.in);\n\t\tString name = input.nextLine();\n\t}\n}`,
            py: `import random\ndef get_lucky_number():\n\treturn random.randint(1, 100)\n\nfor i in range(5):\n\tprint(f"Number {i}: {get_lucky_number()}")`
        };

        let activeCode = "";
        let currentIndex = 0;
        let startTime = null;
        let timerInt = null;

        const display = document.getElementById('display');
        const input = document.getElementById('hidden-input');

        function toggleTheme() {
            const current = document.documentElement.getAttribute('data-theme');
            document.documentElement.setAttribute('data-theme', current === 'dark' ? 'light' : 'dark');
        }

        function init() {
            clearInterval(timerInt);
            const raw = library[document.getElementById('lang').value];
            const maxLines = parseInt(document.getElementById('line-count').value);
            
            const lines = raw.split('\n');
            const start = Math.floor(Math.random() * Math.max(1, lines.length - maxLines));
            activeCode = lines.slice(start, start + maxLines).join('\n');

            currentIndex = 0;
            startTime = null;
            input.value = "";
            document.getElementById('wpm').innerText = "0";
            document.getElementById('acc').innerText = "100%";
            document.getElementById('timer').innerText = "0s";
            document.getElementById('progress').style.width = "0%";
            document.getElementById('result-modal').style.display = 'none';
            render();
            input.focus();
        }

        function render() {
            display.innerHTML = "";
            activeCode.split('').forEach((char, i) => {
                const span = document.createElement('span');
                span.innerText = char;
                span.className = (i === 0) ? 'current' : '';
                display.appendChild(span);
            });
        }

        window.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') init();
            if (e.key === 'Tab') {
                e.preventDefault(); // Prevents browser focus jump
                if (activeCode[currentIndex] === '\t') {
                    input.value += '\t';
                    handleInput();
                }
            }
        });

        input.addEventListener('input', handleInput);

        function handleInput() {
            if (!startTime && input.value.length > 0) {
                startTime = Date.now();
                timerInt = setInterval(() => {
                    const now = Math.floor((Date.now() - startTime) / 1000);
                    document.getElementById('timer').innerText = now + "s";
                }, 1000);
            }

            const val = input.value;
            currentIndex = val.length;
            const spans = display.querySelectorAll('span');
            let errs = 0;

            spans.forEach((span, i) => {
                span.className = "";
                if (i < val.length) {
                    if (val[i] === activeCode[i]) span.classList.add('correct');
                    else { span.classList.add('incorrect'); errs++; }
                }
                if (i === currentIndex) span.classList.add('current');
            });

            const elapsed = (Date.now() - startTime) / 60000;
            if (elapsed > 0 && currentIndex > 2) {
                const wpm = Math.round((currentIndex / 5) / elapsed);
                document.getElementById('wpm').innerText = Math.min(wpm, 600);
                const acc = Math.round(((currentIndex - errs) / currentIndex) * 100);
                document.getElementById('acc').innerText = acc + "%";
            }

            document.getElementById('progress').style.width = (currentIndex / activeCode.length * 100) + "%";
            if (val.length >= activeCode.length) finish();
        }

        function finish() {
            clearInterval(timerInt);
            document.getElementById('result-modal').style.display = 'block';
            document.getElementById('final-stats').innerHTML = `WPM: ${document.getElementById('wpm').innerText} <br> Accuracy: ${document.getElementById('acc').innerText}`;
        }

        function focusInput() { input.focus(); }
        window.addEventListener('click', focusInput);
        init();
    </script>
</body>
</html>
