<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Applekour Community | Hard Clips</title>
    <style>
        body { 
            margin: 0; 
            background-color: #000; 
            color: #fff; 
            font-family: 'Inter', sans-serif; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh;
            position: relative;
        }

        .main-container {
            width: 100%;
            max-width: 700px;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        .video-box {
            width: 100%;
            padding-top: 56.25%;
            position: relative;
            border-radius: 24px;
            overflow: hidden;
            background: #0a0a0a;
            margin-bottom: 30px;
        }

        .video-box iframe {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%; border: none;
        }

        .submit-section {
            width: 100%;
            max-width: 380px;
            text-align: center;
        }

        h1 { 
            font-size: 2.2rem; 
            margin-bottom: 5px;
            background: linear-gradient(135deg, #ff6600, #ffcc00);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        
        p { 
            color: #888; 
            margin-bottom: 25px; 
            font-size: 0.9rem; 
        }

        .inputs { display: flex; flex-direction: column; gap: 10px; }
        
        input {
            background: #111;
            border: 1px solid #222;
            color: #fff;
            padding: 14px;
            border-radius: 12px;
            font-size: 0.9rem;
        }

        input[type="file"] {
            cursor: pointer;
            font-size: 0.8rem;
            border: 1px dashed #444;
        }

        button {
            background: linear-gradient(135deg, #ff6600, #ffcc00);
            color: #000;
            border: none;
            padding: 16px;
            border-radius: 12px;
            font-weight: 800;
            cursor: pointer;
            margin-top: 10px;
            transition: 0.3s;
        }

        button:hover { 
            background: linear-gradient(135deg, #ff5500, #ffbb00);
            transform: translateY(-2px); 
        }
        
        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .watermark {
            position: fixed;
            bottom: 20px;
            right: 25px;
            color: #333;
            font-size: 0.8rem;
            font-family: monospace;
            letter-spacing: 1px;
            user-select: none;
        }

        .status {
            margin-top: 15px;
            padding: 10px;
            border-radius: 8px;
            font-size: 0.85rem;
            display: none;
        }

        .status.success {
            background: #0a2f1f;
            color: #00ff88;
            border: 1px solid #00ff88;
            display: block;
        }

        .status.error {
            background: #2f0a0a;
            color: #ff4444;
            border: 1px solid #ff4444;
            display: block;
        }

        .status.loading {
            background: #1a1a2f;
            color: #ffaa44;
            border: 1px solid #ffaa44;
            display: block;
        }
        
        .badge {
            display: inline-block;
            background: #ff6600;
            color: #000;
            font-size: 0.7rem;
            padding: 2px 8px;
            border-radius: 20px;
            margin-left: 8px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="main-container">
        <div class="video-box">
            <iframe src="https://streamable.com/e/dosqic?autoplay=1&muted=1&nocontrols=1" allow="autoplay"></iframe>
        </div>

        <div class="submit-section">
            <h1>APPLEKOUR <span class="badge">HARD CLIPS</span></h1>
            <p>Community Hard Clips — Submit your best tricks</p>
            
            <div class="inputs">
                <input type="text" id="nick" placeholder="In-game Nickname" required>
                <input type="text" id="discord" placeholder="Discord Link / ID" required>
                <input type="text" id="clip_link" placeholder="Link (YouTube, Streamable, etc.)">
                <input type="file" id="clip_file" accept="video/mp4,video/webm,video/quicktime">
                
                <button onclick="sendToDiscord()">Submit Hard Clip</button>
            </div>
            <div id="status" class="status"></div>
        </div>
    </div>

    <div class="watermark">mikk319</div>

    <script>
        // 👇 ЗАМЕНИ ЭТУ ССЫЛКУ НА ТВОЙ WEBHOOK URL 👇
        const WEBHOOK_URL = "https://discord.com/api/webhooks/ТВОЙ_АЙДИ/ТВОЙ_ТОКЕН";

        async function sendToDiscord() {
            const nick = document.getElementById('nick').value.trim();
            const disc = document.getElementById('discord').value.trim();
            const link = document.getElementById('clip_link').value.trim();
            const fileInput = document.getElementById('clip_file');
            const file = fileInput.files[0];
            
            const statusDiv = document.getElementById('status');
            const submitBtn = document.querySelector('button');
            
            if(!nick || !disc) {
                showStatus("❌ Please fill Name and Discord!", "error");
                return;
            }
            
            if(!link && !file) {
                showStatus("❌ Please provide a link OR upload a video file!", "error");
                return;
            }
            
            if(file && file.size > 25 * 1024 * 1024) {
                showStatus("❌ File too large! Max 25MB for Discord.", "error");
                return;
            }
            
            submitBtn.disabled = true;
            submitBtn.textContent = "Sending...";
            showStatus("📤 Sending hard clip to Discord...", "loading");
            
            try {
                if(file) {
                    const formData = new FormData();
                    formData.append("file", file);
                    
                    const payload = {
                        content: `**🔥 APPLEKOUR | HARD CLIP SUBMISSION 🔥**\n**Player:** ${nick}\n**Discord:** ${disc}\n**Source:** Video file upload`,
                        embeds: [{
                            color: 0xFF6600,
                            fields: [
                                { name: "👤 Player", value: nick, inline: true },
                                { name: "💬 Discord", value: disc, inline: true },
                                { name: "📁 Type", value: "Hard Clip (File)", inline: true }
                            ],
                            footer: { text: "AppleKour Community Hard Clips" },
                            timestamp: new Date().toISOString()
                        }]
                    };
                    
                    formData.append("payload_json", JSON.stringify(payload));
                    
                    const response = await fetch(WEBHOOK_URL, {
                        method: 'POST',
                        body: formData
                    });
                    
                    if(response.ok) {
                        showStatus("✅ Hard clip successfully sent! Admin will review.", "success");
                        clearForm();
                    } else {
                        showStatus("❌ Error sending file. Try using a link instead.", "error");
                    }
                    
                } else {
                    const embed = {
                        title: "🎬 HARD CLIP SUBMISSION",
                        color: 0xFF6600,
                        fields: [
                            { name: "👤 Player", value: nick, inline: true },
                            { name: "💬 Discord", value: disc, inline: true },
                            { name: "🔗 Clip Link", value: link, inline: false }
                        ],
                        footer: { text: "AppleKour Community Hard Clips" },
                        timestamp: new Date().toISOString()
                    };
                    
                    const response = await fetch(WEBHOOK_URL, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            content: `**🔥 New Hard Clip from ${nick} 🔥**`,
                            embeds: [embed]
                        })
                    });
                    
                    if(response.ok) {
                        showStatus("✅ Hard clip link successfully sent!", "success");
                        clearForm();
                    } else {
                        showStatus("❌ Error sending. Check webhook URL.", "error");
                    }
                }
                
            } catch (err) {
                console.error(err);
                showStatus("❌ Connection error. Check your internet.", "error");
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = "Submit Hard Clip";
            }
        }
        
        function showStatus(message, type) {
            const statusDiv = document.getElementById('status');
            statusDiv.textContent = message;
            statusDiv.className = `status ${type}`;
            
            if(type === "success" || type === "error") {
                setTimeout(() => {
                    statusDiv.style.display = "none";
                }, 5000);
            } else {
                statusDiv.style.display = "block";
            }
        }
        
        function clearForm() {
            document.getElementById('nick').value = "";
            document.getElementById('discord').value = "";
            document.getElementById('clip_link').value = "";
            document.getElementById('clip_file').value = "";
        }
    </script>
</body>
</html>
