<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MonkeyCode | Minimalist Coding Test</title>
    <style>
        :root {
            --bg-color: #323437;
            --main-color: #e2b714;
            --caret-color: #e2b714;
            --sub-color: #646669;
            --text-color: #d1d0c5;
            --error-color: #ca4754;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Fira Code', 'Roboto Mono', monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        /* Top Navigation Bar */
        .config-bar {
            display: flex;
            gap: 20px;
            background: rgba(0,0,0,0.1);
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 14px;
            color: var(--sub-color);
            margin-bottom: 40px;
        }

        .config-group span { cursor: pointer; transition: 0.2s; }
        .config-group span:hover, .config-group span.active { color: var(--text-color); }
        .config-group b { color: var(--main-color); margin-right: 5px; }

        /* Typing Area */
        #test-container {
            width: 90%;
            max-width: 1000px;
            position: relative;
        }

        #display-text {
            font-size: 24px;
            line-height: 1.5;
            color: var(--sub-color);
            word-break: break-all;
            user-select: none;
        }

        .letter { position: relative; }
        .letter.correct { color: var(--text-color); }
        .letter.incorrect { color: var(--error-color); border-bottom: 2px solid var(--error-color); }
        
        #hidden-input {
            position: absolute;
            opacity: 0;
            cursor: default;
        }

        /* Results Screen */
        #results-screen {
            display: none;
            text-align: left;
            animation: fadeIn 0.4s ease;
        }

        .stat-large { font-size: 64px; color: var(--main-color); margin: 0; }
        .stat-label { color: var(--sub-color); font-size: 18px; }

        .btn {
            background: none;
            border: 1px solid var(--sub-color);
            color: var(--sub-color);
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 20px;
        }
        .btn:hover { background: var(--sub-color); color: var(--bg-color); }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

    <div class="config-bar" id="config">
        <div class="config-group">
            <b>language</b>
            <span class="lang-opt active" data-lang="js">javascript</span>
            <span class="lang-opt" data-lang="py">python</span>
            <span class="lang-opt" data-lang="cpp">c++</span>
        </div>
        <div class="config-group">
            <b>lines</b>
            <span class="line-opt" data-val="15">15</span>
            <span class="line-opt active" data-val="20">20</span>
            <span class="line-opt" data-val="30">30</span>
        </div>
        <div class="config-group">
            <b>time</b>
            <span id="timer-display" style="color: var(--main-color);">60</span>
        </div>
    </div>

    <div id="test-container">
        <input type="text" id="hidden-input" autofocus>
        <div id="display-text"></div>
    </div>

    <div id="results-screen">
        <p class="stat-label">wpm</p>
        <h1 class="stat-large" id="res-wpm">0</h1>
        <p class="stat-label">accuracy</p>
        <h1 class="stat-large" id="res-acc" style="font-size: 32px;">0%</h1>
        <button class="btn" onclick="location.reload()">restart</button>
        <button class="btn" onclick="exportResults()">save .txt</button>
    </div>

<script>
    const languages = {
        js: ["const x = 10;", "console.log('hello');", "function init() {", "return a + b;", "if (items.length > 0) {", "export default class {", "await fetch(url);"],
        py: ["def main():", "print(f'Hello {name}')", "if __name__ == '__main__':", "items = [1, 2, 3]", "return sum(numbers)", "for i in range(10):"],
        cpp: ["#include <iostream>", "std::cout << 'Hi';", "int main() {", "using namespace std;", "vector<int> v;", "return 0;"]
    };

    let activeLang = 'js';
    let lineCount = 20;
    let timeLeft = 60;
    let timer = null;
    let isStarted = false;
    let charIndex = 0;
    let mistakes = 0;

    const display = document.getElementById('display-text');
    const input = document.getElementById('hidden-input');
    const timerDisplay = document.getElementById('timer-display');

    // Initialize Test
    function setupTest() {
        display.innerHTML = '';
        let fullText = "";
        for(let i=0; i < lineCount; i++) {
            let pool = languages[activeLang];
            fullText += pool[Math.floor(Math.random() * pool.length)] + " ";
        }
        
        fullText.split('').forEach(char => {
            const span = document.createElement('span');
            span.innerText = char;
            span.classList.add('letter');
            display.appendChild(span);
        });
    }

    // Input Handling
    input.addEventListener('input', (e) => {
        if (!isStarted) startTimer();
        
        const chars = display.querySelectorAll('.letter');
        const typedChar = input.value.split('')[charIndex];

        if (typedChar == null) { // Backspace
            if (charIndex > 0) {
                charIndex--;
                chars[charIndex].classList.remove('correct', 'incorrect');
            }
        } else {
            if (typedChar === chars[charIndex].innerText) {
                chars[charIndex].classList.add('correct');
            } else {
                chars[charIndex].classList.add('incorrect');
                mistakes++;
            }
            charIndex++;
        }

        // Auto-end if text finished
        if (charIndex === chars.length) endTest();
    });

    function startTimer() {
        isStarted = true;
        timer = setInterval(() => {
            timeLeft--;
            timerDisplay.innerText = timeLeft;
            if (timeLeft <= 0) endTest();
        }, 1000);
    }

    function endTest() {
        clearInterval(timer);
        input.disabled = true; // LOCK INPUT
        
        const wpm = Math.round((charIndex / 5) / ( (60 - timeLeft) / 60 ));
        const acc = Math.round(((charIndex - mistakes) / charIndex) * 100);

        document.getElementById('test-container').style.display = 'none';
        document.getElementById('config').style.display = 'none';
        document.getElementById('results-screen').style.display = 'block';
        
        document.getElementById('res-wpm').innerText = isNaN(wpm) ? 0 : wpm;
        document.getElementById('res-acc').innerText = (acc < 0 ? 0 : acc) + "%";
    }

    function exportResults() {
        const data = `MonkeyCode Result\nWPM: ${document.getElementById('res-wpm').innerText}\nAccuracy: ${document.getElementById('res-acc').innerText}`;
        const blob = new Blob([data], {type: 'text/plain'});
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = 'results.txt';
        a.click();
    }

    // Language/Line Switching Logic
    document.querySelectorAll('.lang-opt').forEach(opt => {
        opt.onclick = () => {
            document.querySelectorAll('.lang-opt').forEach(o => o.classList.remove('active'));
            opt.classList.add('active');
            activeLang = opt.dataset.lang;
            setupTest();
        };
    });

    document.querySelectorAll('.line-opt').forEach(opt => {
        opt.onclick = () => {
            document.querySelectorAll('.line-opt').forEach(o => o.classList.remove('active'));
            opt.classList.add('active');
            lineCount = parseInt(opt.dataset.val);
            setupTest();
        };
    });

    // Clicking anywhere focuses the input
    document.addEventListener('click', () => input.focus());

    setupTest();
</script>
</body>
</html>
