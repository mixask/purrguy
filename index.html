<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Misha's Pro Code Type</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0d0d0d;
            --purple: #D9CCFF;
            --teal: #B6FFE9;
            --gray: #444;
            --error: #ff6060;
        }

        body {
            background-color: var(--bg);
            color: white;
            font-family: 'JetBrains Mono', monospace;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }

        .container { width: 90%; max-width: 900px; }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 1px solid rgba(217, 204, 255, 0.1);
        }

        .stats-row { display: flex; gap: 30px; color: var(--purple); font-size: 1.2rem; }
        .stat-val { color: var(--teal); font-weight: bold; }

        #progress-container {
            width: 100%;
            height: 4px;
            background: rgba(255,255,255,0.1);
            margin-bottom: 20px;
            border-radius: 2px;
        }
        #progress-bar { width: 0%; height: 100%; background: var(--teal); transition: 0.1s; }

        #typing-area {
            background: rgba(255,255,255,0.03);
            padding: 40px;
            border-radius: 12px;
            position: relative;
            font-size: 18px;
            line-height: 1.6;
            white-space: pre-wrap;
            word-break: break-all;
            color: var(--gray);
            border: 1px solid rgba(182, 255, 233, 0.1);
            max-height: 60vh;
            overflow-y: auto;
        }

        .correct { color: var(--teal); }
        .incorrect { color: var(--error); background: rgba(255, 96, 96, 0.2); }
        .current { border-left: 2px solid var(--teal); animation: blink 1s infinite; }

        @keyframes blink { 50% { border-color: transparent; } }

        #hidden-input { position: absolute; opacity: 0; pointer-events: none; }

        .footer-hint { margin-top: 20px; color: #555; font-size: 0.8rem; text-align: center; }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <div class="stats-row">
                <div>WPM: <span id="wpm" class="stat-val">0</span></div>
                <div>ACC: <span id="acc" class="stat-val">100</span>%</div>
            </div>
            <div style="color: var(--purple); font-weight: bold;">SPEEDTEST.EXE</div>
        </div>

        <div id="progress-container"><div id="progress-bar"></div></div>

        <div id="typing-area" onclick="focusInput()">
            <div id="text-display"></div>
            <input type="text" id="hidden-input" spellcheck="false" autocomplete="off">
        </div>

        <div class="footer-hint">
            TAB to indent | ESC to restart | Click box to focus
        </div>
    </div>

    <script>
        // PASTE YOUR 7.6k CHARACTER CODE INSIDE THE QUOTES BELOW
        const codeSnippet = "function start()\n\tprint('Hello Misha')\nend"; 

        let currentIndex = 0;
        let startTime = null;
        let errors = 0;

        const display = document.getElementById('text-display');
        const input = document.getElementById('hidden-input');
        const wpmDisplay = document.getElementById('wpm');
        const accDisplay = document.getElementById('acc');
        const progressBar = document.getElementById('progress-bar');

        function initTest() {
            currentIndex = 0;
            startTime = null;
            errors = 0;
            input.value = "";
            wpmDisplay.innerText = "0";
            accDisplay.innerText = "100";
            progressBar.style.width = "0%";
            render();
        }

        function render() {
            display.innerHTML = "";
            codeSnippet.split('').forEach((char, i) => {
                const span = document.createElement('span');
                span.innerText = char;
                if (i === 0) span.className = "current";
                display.appendChild(span);
            });
        }

        function focusInput() { input.focus(); }

        // THE TAB AND ESC FIXES
        window.addEventListener('keydown', (e) => {
            if (e.key === 'Tab' && document.activeElement === input) {
                e.preventDefault(); // STOPS browser jump
                if (codeSnippet[currentIndex] === '\t') {
                    input.value += '\t';
                    handleInput();
                }
            }
            if (e.key === 'Escape') initTest(); // RESTART FEATURE
        });

        input.addEventListener('input', handleInput);

        function handleInput() {
            // Start timer on first keypress
            if (!startTime && input.value.length > 0) startTime = Date.now();
            
            const val = input.value;
            currentIndex = val.length;
            const spans = display.querySelectorAll('span');

            let currentErrors = 0;
            spans.forEach((span, i) => {
                span.className = "";
                if (i < val.length) {
                    if (val[i] === codeSnippet[i]) {
                        span.classList.add('correct');
                    } else {
                        span.classList.add('incorrect');
                        currentErrors++;
                    }
                }
                if (i === currentIndex) span.classList.add('current');
            });

            // Update Progress Bar
            const progress = (currentIndex / codeSnippet.length) * 100;
            progressBar.style.width = `${progress}%`;

            // WPM MATH FIX
            if (currentIndex > 5 && startTime) {
                const timeSec = (Date.now() - startTime) / 1000;
                const wpm = Math.round((currentIndex / 5) / (timeSec / 60));
                wpmDisplay.innerText = Math.min(wpm, 500); // Caps at 500 to avoid glitches
                
                const acc = Math.round(((currentIndex - currentErrors) / currentIndex) * 100);
                accDisplay.innerText = acc;
            }

            // Finish Logic
            if (val.length === codeSnippet.length) {
                alert("Finished! WPM: " + wpmDisplay.innerText);
                initTest();
            }
        }

        window.addEventListener('click', focusInput);
        initTest();
    </script>
</body>
</html>
