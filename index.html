// УЛУЧШЕННАЯ функция проверки Roblox пользователя
async function checkRobloxUser(username) {
    try {
        // Способ 1: Поиск через API с точным совпадением
        const searchResponse = await fetch(`https://users.roblox.com/v1/users/search?keyword=${encodeURIComponent(username)}&limit=10`);
        const searchData = await searchResponse.json();
        
        if (searchData.data && searchData.data.length > 0) {
            // Ищем точное совпадение (игнорируя регистр)
            const exactMatch = searchData.data.find(user => 
                user.name.toLowerCase() === username.toLowerCase()
            );
            
            if (exactMatch) {
                return {
                    exists: true,
                    id: exactMatch.id,
                    username: exactMatch.name,
                    displayName: exactMatch.displayName
                };
            }
        }
        
        // Способ 2: Прямой запрос по имени (если поиск не сработал)
        try {
            const directResponse = await fetch(`https://api.roblox.com/users/get-by-username?username=${encodeURIComponent(username)}`);
            const directData = await directResponse.json();
            
            if (directData && directData.Id) {
                return {
                    exists: true,
                    id: directData.Id,
                    username: directData.Username,
                    displayName: directData.Username
                };
            }
        } catch (e) {
            console.log("Direct API method failed, continuing...");
        }
        
        return { exists: false };
        
    } catch (error) {
        console.error("Roblox API error:", error);
        return { exists: false, error: true };
    }
}
