<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loading...</title>
    <style id="monkey-style">
        :root { --bg-color: #323437; --main-color: #e2b714; --sub-color: #646669; --text-color: #d100c5; --error-color: #ca4754; }
        body.monkey-theme { background-color: var(--bg-color); color: var(--text-color); font-family: 'Fira Code', monospace; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        /* ... тут все твои остальные стили MonkeyCode из промпта ... */
        .main-wrapper { width: 100%; max-width: 1100px; padding: 40px; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
        .config-bar { display: flex; gap: 30px; color: var(--sub-color); margin-bottom: 60px; font-size: 14px; background: rgba(0, 0, 0, 0.15); padding: 12px 30px; border-radius: 12px; user-select: none; backdrop-filter: blur(5px); }
        .config-group { display: flex; gap: 12px; align-items: center; }
        .config-group b { color: var(--main-color); font-weight: normal; }
        .opt { cursor: pointer; transition: 0.2s; }
        .opt:hover, .opt.active { color: var(--text-color); }
        .opt.active { color: var(--main-color); }
        #test-container { width: 100%; position: relative; min-height: 200px; }
        #display-text { font-size: 22px; line-height: 1.6; color: var(--sub-color); white-space: pre-wrap; word-break: break-word; text-align: left; max-height: 50vh; overflow-y: hidden; }
        .letter { position: relative; border-left: 2px solid transparent; }
        .letter.active { border-left-color: var(--main-color); animation: blink 1s infinite; }
        .letter.correct { color: var(--text-color); }
        .letter.incorrect { color: var(--error-color); background: rgba(202, 71, 84, 0.1); }
        #hidden-input { position: absolute; top: 0; left: 0; opacity: 0; pointer-events: none; }
        #results-screen { display: none; animation: fadeIn 0.4s ease forwards; }
        .stat-val { font-size: 6rem; color: var(--main-color); margin: 0; line-height: 1; }
        .stat-label { color: var(--sub-color); font-size: 1.2rem; margin-bottom: 20px; text-transform: lowercase; }
        .btn-row { display: flex; gap: 20px; margin-top: 50px; justify-content: center; }
        .btn { background: none; border: 1px solid var(--sub-color); color: var(--sub-color); padding: 14px 28px; border-radius: 8px; cursor: pointer; font-family: inherit; font-size: 1rem; transition: 0.3s; }
        .btn:hover { background: var(--text-color); color: var(--bg-color); border-color: var(--text-color); }
        @keyframes blink { 50% { border-left-color: transparent; } }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
    </style>

    <style id="apple-style">
        body.apple-theme { background-color: #000; color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        .video-side { flex: 1; background: #050505; position: relative; border-right: 2px solid #00f2ff; }
        .video-side iframe { width: 100%; height: 100%; pointer-events: none; }
        .form-side { width: 450px; padding: 40px; background: #0a0a0a; display: flex; flex-direction: column; justify-content: center; box-shadow: -10px 0 30px rgba(0, 242, 255, 0.1); }
        .apple-theme h1 { color: #00f2ff; text-shadow: 0 0 15px rgba(0, 242, 255, 0.5); margin-bottom: 30px; font-size: 2.5rem; }
        .apple-theme input { background: #1a1a1a; border: 1px solid #333; color: white; padding: 15px; margin: 10px 0; border-radius: 8px; font-size: 1rem; }
        .apple-theme input:focus { border-color: #00f2ff; outline: none; box-shadow: 0 0 10px rgba(0, 242, 255, 0.2); }
        .apple-theme button { background: #00f2ff; color: black; font-weight: bold; border: none; padding: 15px; margin-top: 20px; border-radius: 8px; cursor: pointer; transition: 0.3s; font-size: 1.1rem; }
        .apple-theme button:hover { background: #fff; transform: translateY(-2px); }
    </style>
</head>
<body>

    <div id="monkey-content" style="display: none;">
        <div class="main-wrapper">
            <div class="config-bar" id="menu">
                <div class="config-group" id="lang-menu">
                    <b>type</b>
                    <span class="opt active" data-lang="en">english</span>
                    <span class="opt" data-lang="ru">russian</span>
                    <span class="opt" data-lang="lv">latvian</span>
                    <span class="opt" data-lang="js">javascript</span>
                    <span class="opt" data-lang="py">python</span>
                    <span class="opt" data-lang="rnd">randomize</span>
                </div>
                </div>
            <div id="test-container">
                <div id="timer-live" style="color: var(--main-color); font-size: 1.8rem; margin-bottom: 20px; height: 30px; visibility: hidden;">60</div>
                <textarea id="hidden-input" spellcheck="false" autocomplete="off"></textarea>
                <div id="display-text"></div>
            </div>
            <div id="results-screen">
                <h1 class="stat-val" id="res-wpm">0</h1>
                <h1 class="stat-val" id="res-acc" style="font-size: 3rem;">0%</h1>
                <button class="btn" onclick="location.reload()">restart</button>
            </div>
        </div>
    </div>

    <div id="apple-content" style="display: none; width: 100%;">
        <div class="video-side">
            <iframe src="https://www.youtube.com/embed/ymH6T6oI1Sg?autoplay=1&mute=1&controls=0&loop=1&playlist=ymH6T6oI1Sg" frameborder="0"></iframe>
        </div>
        <div class="form-side">
            <h1>Applekour Submit</h1>
            <input type="text" id="nick" placeholder="Nickname in clip">
            <input type="text" id="discord" placeholder="Discord Link / Tag">
            <input type="text" id="clip" placeholder="Clip Link (YT / Streamable)">
            <button onclick="submitToDiscord()">SUBMIT TRICK</button>
        </div>
    </div>

    <script>
        const hostname = window.location.hostname;

        if (hostname.includes('applekour-cht')) {
            // ЛОГИКА ДЛЯ APPLEKOUR
            document.title = "Applekour | Community Tricks";
            document.body.classList.add('apple-theme');
            document.getElementById('apple-content').style.display = 'flex';
            document.getElementById('monkey-style').remove();
        } else {
            // ЛОГИКА ДЛЯ MONKEYCODE (по умолчанию)
            document.title = "MonkeyCode | Final Edition";
            document.body.classList.add('monkey-theme');
            document.getElementById('monkey-content').style.display = 'flex';
            document.getElementById('apple-style').remove();
            
            // Сюда вставь весь свой старый JS-код для MonkeyCode (функции setupTest, startTimer и т.д.)
        }

        function submitToDiscord() {
            alert('Бот будет настроен на следующем этапе! Сейчас мы проверяем дизайн.');
        }
    </script>
</body>
</html>
