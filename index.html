<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loading...</title>
    <style>
        /* --- ОБЩИЕ СТИЛИ --- */
        :root {
            --bg-color: #323437;
            --main-color: #e2b714;
            --sub-color: #646669;
            --text-color: #d100c5;
            --error-color: #ca4754;
            --apple-cyan: #00f2ff;
        }

        body { margin: 0; padding: 0; overflow: hidden; transition: background 0.5s; }

        /* --- СТИЛИ MONKEYCODE --- */
        body.monkey-theme { background-color: var(--bg-color); color: var(--text-color); font-family: 'Fira Code', monospace; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .monkey-theme .main-wrapper { width: 100%; max-width: 1100px; padding: 40px; display: flex; flex-direction: column; align-items: center; text-align: center; }
        .monkey-theme .config-bar { display: flex; gap: 30px; color: var(--sub-color); margin-bottom: 60px; font-size: 14px; background: rgba(0, 0, 0, 0.15); padding: 12px 30px; border-radius: 12px; backdrop-filter: blur(5px); }
        .monkey-theme .opt { cursor: pointer; transition: 0.2s; }
        .monkey-theme .opt.active { color: var(--main-color); }
        .monkey-theme #display-text { font-size: 22px; line-height: 1.6; color: var(--sub-color); text-align: left; }
        .monkey-theme .letter.active { border-left: 2px solid var(--main-color); animation: blink 1s infinite; }
        .monkey-theme .letter.correct { color: var(--text-color); }
        .monkey-theme .letter.incorrect { color: var(--error-color); background: rgba(202, 71, 84, 0.1); }
        .monkey-theme .stat-val { font-size: 6rem; color: var(--main-color); margin: 0; }
        @keyframes blink { 50% { border-left-color: transparent; } }

        /* --- СТИЛИ APPLEKOUR --- */
        body.apple-theme { background-color: #000; color: #fff; font-family: 'Segoe UI', sans-serif; display: flex; height: 100vh; }
        .apple-theme .video-side { flex: 1; background: #000; position: relative; border-right: 1px solid #222; }
        .apple-theme .video-side iframe { width: 100%; height: 100%; border: none; pointer-events: none; scale: 1.1; }
        .apple-theme .form-side { width: 450px; padding: 60px; background: #0a0a0a; display: flex; flex-direction: column; justify-content: center; border-left: 1px solid #00f2ff33; }
        .apple-theme h1 { color: var(--apple-cyan); text-shadow: 0 0 15px rgba(0, 242, 255, 0.4); font-size: 2.2rem; margin-bottom: 5px; }
        .apple-theme p { color: #888; margin-bottom: 30px; font-size: 0.9rem; }
        .apple-theme input { background: #111; border: 1px solid #333; color: white; padding: 15px; margin: 8px 0; border-radius: 5px; font-family: inherit; }
        .apple-theme input:focus { border-color: var(--apple-cyan); outline: none; }
        .apple-theme button { background: var(--apple-cyan); color: #000; border: none; padding: 18px; margin-top: 25px; border-radius: 5px; font-weight: bold; cursor: pointer; transition: 0.3s; text-transform: uppercase; letter-spacing: 1px; }
        .apple-theme button:hover { background: #fff; transform: translateY(-2px); box-shadow: 0 5px 15px rgba(0, 242, 255, 0.3); }

        #hidden-input { position: absolute; opacity: 0; pointer-events: none; }
    </style>
</head>
<body>

    <div id="apple-ui" style="display: none; width: 100%; height: 100%; display: none;">
        <div class="video-side">
            <iframe src="https://www.youtube.com/embed/ymH6T6oI1Sg?autoplay=1&mute=1&controls=0&loop=1&playlist=ymH6T6oI1Sg&modestbranding=1" allow="autoplay"></iframe>
        </div>
        <div class="form-side">
            <h1>APPLEKOUR</h1>
            <p>Community Hard Tricks Submission</p>
            <input type="text" id="apple-nick" placeholder="In-game Nickname">
            <input type="text" id="apple-discord" placeholder="Discord (Name#0000 or Link)">
            <input type="text" id="apple-clip" placeholder="Clip Link (YT/Streamable)">
            <button onclick="sendToDiscord()">Submit Clip</button>
        </div>
    </div>

    <div id="monkey-ui" style="display: none;">
        <div class="main-wrapper">
            <div class="config-bar" id="menu">
                <div class="config-group" id="lang-menu">
                    <b>type</b>
                    <span class="opt active" data-lang="en">english</span>
                    <span class="opt" data-lang="ru">russian</span>
                    <span class="opt" data-lang="lv">latvian</span>
                    <span class="opt" data-lang="js">javascript</span>
                    <span class="opt" data-lang="py">python</span>
                    <span class="opt" data-lang="rnd">randomize</span>
                </div>
                <div class="config-group" id="line-menu">
                    <b>density</b>
                    <span class="opt active" data-val="15">low</span>
                    <span class="opt" data-val="30">med</span>
                    <span class="opt" data-val="50">high</span>
                </div>
                <div class="config-group" id="time-menu">
                    <b>time</b>
                    <span class="opt" data-time="15">15</span>
                    <span class="opt" data-time="30">30</span>
                    <span class="opt active" data-time="60">60</span>
                </div>
            </div>

            <div id="test-container">
                <div id="timer-live" style="color: var(--main-color); font-size: 1.8rem; margin-bottom: 20px; height: 30px; visibility: hidden;">60</div>
                <textarea id="hidden-input" spellcheck="false" autocomplete="off"></textarea>
                <div id="display-text"></div>
            </div>

            <div id="results-screen" style="display: none;">
                <p class="stat-label">wpm</p>
                <h1 class="stat-val" id="res-wpm">0</h1>
                <p class="stat-label">accuracy</p>
                <h1 class="stat-val" id="res-acc" style="font-size: 3rem;">0%</h1>
                <div class="btn-row">
                    <button class="btn" onclick="location.reload()">restart test</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const host = window.location.hostname;
        const isApple = host.includes('applekour');

        if (isApple) {
            document.title = "Applekour | Submit Tricks";
            document.body.className = "apple-theme";
            document.getElementById('apple-ui').style.display = 'flex';
        } else {
            document.title = "MonkeyCode | Final Edition";
            document.body.className = "monkey-theme";
            document.getElementById('monkey-ui').style.display = 'block';
            initMonkeyLogic(); // Запуск твоего старого кода
        }

        // --- ЛОГИКА ОТПРАВКИ (ПОКА ЗАГЛУШКА) ---
        function sendToDiscord() {
            const nick = document.getElementById('apple-nick').value;
            const disc = document.getElementById('apple-discord').value;
            const clip = document.getElementById('apple-clip').value;

            if(!nick || !disc || !clip) return alert("Заполни все поля!");
            
            alert(`Отправляем: ${nick} | ${disc}. Скоро настроим бота!`);
        }

        // --- ВЕСЬ ТВОЙ СТАРЫЙ КОД MONKEYCODE ---
        function initMonkeyLogic() {
            const contentPool = {
                en: ["Focus on the journey — not the destination.", "Clean code looks like it was written by someone who cares.", "The best way to predict the future is to invent it.", "Software is a combination between artistry and engineering.", "Simplicity is the soul of efficiency.", "Talk is cheap — show me the code.", "Stay hungry — stay foolish."],
                ru: ["Программирование — это способ думать о вещах.", "Код должен быть понятен человеку — а не только машине.", "Семь раз отмерь — один раз отрежь.", "Ученье — свет, а неученье — тьма.", "Сложность — это враг надежности.", "Пишите код так, будто сопровождать его будет маньяк-психопат."],
                lv: ["Darbs dara darītāju — teica vecie latvieši.", "Mūžu dzīvo, mūžu mācies.", "Kas lēni nāk, tas labi nāk.", "Runāšana sudrabs, klusēšana zelts.", "Darbs ir goda lieta.", "Mazs cinītis gāž lielu vezumu — tāda ir dzīve."],
                js: ["const root = ReactDOM.createRoot(document.getElementById('root'));", "app.get('/', (req, res) => res.send('Hello World'));", "const result = data.filter(item => item.active).map(i => i.id);", "async function fetchData() { const res = await fetch(url); }"],
                py: ["def calculate_bmi(weight, height):\n    return weight / (height ** 2)", "print(f'Hello, {user_name}!')", "list_comp = [x for x in data if x > 10]", "with open('config.json') as file:\n    data = json.load(file)"],
                chars: { lv: "āčēģīķļņšūž", ru: "абвгдеёжзийклмнопрстуфхцчшщъыьэюя", en: "abcdefghijklmnopqrstuvwxyz", num: "0123456789", punct: ".,!?;:—()\"'" }
            };

            let activeLang = 'en', lineCount = 15, maxTime = 60, timeLeft = 60;
            let timer = null, isStarted = false, charIndex = 0, mistakes = 0;
            const display = document.getElementById('display-text');
            const input = document.getElementById('hidden-input');
            const timerLive = document.getElementById('timer-live');

            function setupTest() {
                display.innerHTML = ''; input.value = ''; charIndex = 0; mistakes = 0;
                isStarted = false; clearInterval(timer); timeLeft = maxTime;
                timerLive.innerText = timeLeft; timerLive.style.visibility = 'hidden';
                let rawContent = "";
                let pool = contentPool[activeLang];
                for(let i=0; i < lineCount; i++) {
                    rawContent += pool[Math.floor(Math.random() * pool.length)] + " ";
                }
                rawContent.split('').forEach((char, i) => {
                    const span = document.createElement('span');
                    span.innerText = char; span.className = 'letter';
                    if(i === 0) span.classList.add('active');
                    display.appendChild(span);
                });
            }

            input.addEventListener('input', () => {
                if (!isStarted) { isStarted = true; timerLive.style.visibility = 'visible'; timer = setInterval(() => { timeLeft--; timerLive.innerText = timeLeft; if(timeLeft <= 0) endTest(); }, 1000); }
                const chars = display.querySelectorAll('.letter');
                const typedVal = input.value;
                if (typedVal.length < charIndex) { charIndex = typedVal.length; chars.forEach((c, i) => { if(i >= charIndex) c.classList.remove('correct', 'incorrect', 'active'); }); chars[charIndex].classList.add('active'); return; }
                if (typedVal[charIndex] === chars[charIndex].innerText) chars[charIndex].classList.add('correct');
                else { chars[charIndex].classList.add('incorrect'); mistakes++; }
                chars[charIndex].classList.remove('active'); charIndex++;
                if (chars[charIndex]) chars[charIndex].classList.add('active'); else endTest();
            });

            function endTest() {
                clearInterval(timer);
                document.getElementById('test-container').style.display = 'none';
                document.getElementById('menu').style.display = 'none';
                document.getElementById('results-screen').style.display = 'block';
                document.getElementById('res-wpm').innerText = Math.round((charIndex/5)/(maxTime/60));
                document.getElementById('res-acc').innerText = Math.round(((charIndex-mistakes)/charIndex)*100) + "%";
            }

            document.querySelectorAll('.monkey-theme .opt').forEach(opt => {
                opt.onclick = () => {
                    opt.parentElement.querySelectorAll('.opt').forEach(o => o.classList.remove('active'));
                    opt.classList.add('active');
                    if(opt.dataset.lang) activeLang = opt.dataset.lang;
                    if(opt.dataset.val) lineCount = parseInt(opt.dataset.val);
                    if(opt.dataset.time) maxTime = timeLeft = parseInt(opt.dataset.time);
                    setupTest();
                };
            });

            document.addEventListener('click', () => input.focus());
            setupTest();
        }
    </script>
</body>
</html>
