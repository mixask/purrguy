<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Terminal Typer v2.0</title>
    <style>
        :root {
            --bg: #0a0a0c;
            --card: #121217;
            --accent: #00ff9d; /* Neon Green */
            --text: #e0e0e0;
            --border: #2a2a35;
        }

        body {
            font-family: 'Fira Code', 'Courier New', monospace;
            background: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            padding: 50px 20px;
            margin: 0;
        }

        .container {
            width: 100%;
            max-width: 900px;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        /* Header & Controls */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            border-bottom: 1px solid var(--border);
            padding-bottom: 15px;
        }

        .control-group { display: flex; gap: 15px; align-items: center; }
        
        select, input[type="number"] {
            background: #1c1c24;
            color: var(--accent);
            border: 1px solid var(--border);
            padding: 8px;
            border-radius: 4px;
            outline: none;
        }

        .timer-badge {
            font-size: 2rem;
            color: var(--accent);
            text-shadow: 0 0 10px rgba(0, 255, 157, 0.3);
        }

        /* Typing Area */
        #display {
            background: #050507;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            height: 250px;
            overflow-y: auto;
            white-space: pre-wrap;
            line-height: 1.6;
            color: #6272a4; /* Dracula comment color */
            border: 1px solid #1c1c24;
        }

        textarea {
            width: 100%;
            height: 120px;
            background: transparent;
            border: 2px solid var(--border);
            border-radius: 8px;
            color: #fff;
            padding: 15px;
            font-size: 1.1rem;
            font-family: inherit;
            resize: none;
            transition: 0.3s;
        }

        textarea:focus { border-color: var(--accent); box-shadow: 0 0 15px rgba(0, 255, 157, 0.1); outline: none; }
        textarea:disabled { opacity: 0.3; cursor: not-allowed; }

        /* Results Screen */
        #results-screen { display: none; text-align: center; padding: 40px 0; }
        .stat-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin: 30px 0; }
        .stat-card { background: #1c1c24; padding: 20px; border-radius: 8px; border: 1px solid var(--border); }
        .stat-val { font-size: 2rem; color: var(--accent); display: block; }

        .btn {
            background: var(--accent);
            color: #000;
            border: none;
            padding: 12px 25px;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(0, 255, 157, 0.4); }
    </style>
</head>
<body>

<div class="container">
    <div id="test-ui">
        <div class="header">
            <div class="control-group">
                <span>Lines:</span>
                <select id="line-select">
                    <option value="15">15</option>
                    <option value="20">20</option>
                    <option value="30">30</option>
                </select>
                <span>Seconds:</span>
                <input type="number" id="custom-seconds" value="60" min="10" max="300" style="width: 60px;">
            </div>
            <div id="timer" class="timer-badge">60</div>
        </div>

        <div id="display">Loading code environment...</div>
        <textarea id="typing-input" placeholder="Type the code above... (Timer starts on first key)"></textarea>
    </div>

    <div id="results-screen">
        <h1 style="color: var(--accent);">MISSION COMPLETE</h1>
        <div class="stat-grid">
            <div class="stat-card">
                <span class="stat-val" id="res-wpm">0</span>
                <span>WPM</span>
            </div>
            <div class="stat-card">
                <span class="stat-val" id="res-high">0</span>
                <span>BEST</span>
            </div>
            <div class="stat-card">
                <span class="stat-val" id="res-acc">100%</span>
                <span>ACCURACY</span>
            </div>
        </div>
        <div class="control-group" style="justify-content: center;">
            <button class="btn" onclick="location.reload()">Restart</button>
            <button class="btn" style="background: #6272a4; color: white;" onclick="downloadResult()">Save .TXT</button>
        </div>
    </div>
</div>

<script>
    const codePool = [
        "const observer = new IntersectionObserver((entries) => {",
        "export async function getStaticProps(context) {",
        "return Array.from({ length: 10 }, (_, i) => i + 1);",
        "const response = await fetch('/api/v1/data');",
        "if (!result.ok) { throw new Error('Network Error'); }",
        "document.querySelector('.btn').addEventListener('click', run);",
        "const theme = localStorage.getItem('user-theme') || 'dark';",
        "console.log(`Server running at http://localhost:${PORT}`);",
        "const filtered = items.filter(item => item.active === true);",
        "import { useState, useEffect } from 'react';",
        "ctx.clearRect(0, 0, canvas.width, canvas.height);",
        "const hash = crypto.createHash('sha256').update(pwd).digest();"
    ];

    let timer;
    let timeLeft;
    let isStarted = false;
    let wpm = 0;

    const input = document.getElementById('typing-input');
    const display = document.getElementById('display');
    const timerEl = document.getElementById('timer');
    const secInput = document.getElementById('custom-seconds');
    const lineSelect = document.getElementById('line-select');

    // Load High Score
    let highScore = localStorage.getItem('typingHighScore') || 0;

    function init() {
        timeLeft = parseInt(secInput.value);
        timerEl.innerText = timeLeft;
        
        // Generate Dynamic Code
        let codeLines = [];
        const count = parseInt(lineSelect.value);
        for(let i=0; i<count; i++) {
            let line = codePool[Math.floor(Math.random() * codePool.length)];
            codeLines.push(`${(i+1).toString().padStart(2, '0')}  ${line}`);
        }
        display.innerText = codeLines.join('\n');
    }

    input.addEventListener('input', () => {
        if(!isStarted) {
            isStarted = true;
            startCountdown();
        }
    });

    function startCountdown() {
        secInput.disabled = true;
        lineSelect.disabled = true;
        
        timer = setInterval(() => {
            timeLeft--;
            timerEl.innerText = timeLeft;
            if(timeLeft <= 0) endTest();
        }, 1000);
    }

    function endTest() {
        clearInterval(timer);
        input.disabled = true; // LOCK INPUT
        
        // Stats Calculation
        const typed = input.value.trim();
        const words = typed.split(/\s+/).length;
        const minutes = parseInt(secInput.value) / 60;
        wpm = Math.round(words / minutes);

        // Update High Score
        if(wpm > highScore) {
            highScore = wpm;
            localStorage.setItem('typingHighScore', highScore);
        }

        // Show Results Screen
        document.getElementById('test-ui').style.display = 'none';
        document.getElementById('results-screen').style.display = 'block';
        document.getElementById('res-wpm').innerText = wpm;
        document.getElementById('res-high').innerText = highScore;
    }

    function downloadResult() {
        const text = `TYPE TEST RESULT\nDate: ${new Date().toLocaleString()}\nWPM: ${wpm}\nLines: ${lineSelect.value}\nDuration: ${secInput.value}s`;
        const blob = new Blob([text], {type: 'text/plain'});
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `typing-score-${wpm}.txt`;
        a.click();
    }

    // Event listeners for config changes
    secInput.addEventListener('change', init);
    lineSelect.addEventListener('change', init);

    init();
</script>
</body>
</html>
