<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Code Typing Test</title>
    <style>
        body { font-family: monospace; background: #1e1e1e; color: #d4d4d4; padding: 20px; }
        #display { background: #252526; padding: 20px; border-radius: 8px; white-space: pre-wrap; margin-bottom: 20px; border: 1px solid #333; min-height: 200px; }
        textarea { width: 100%; height: 150px; background: #2d2d2d; color: white; border: 2px solid #3e3e42; padding: 10px; font-family: monospace; font-size: 16px; }
        textarea:disabled { opacity: 0.5; cursor: not-allowed; }
        .controls { margin-bottom: 10px; display: flex; gap: 20px; align-items: center; }
        #timer { font-size: 24px; color: #ce9178; font-weight: bold; }
    </style>
</head>
<body>

    <div class="controls">
        <select id="line-select">
            <option value="15">15 Lines</option>
            <option value="20">20 Lines</option>
            <option value="30">30 Lines</option>
        </select>
        <div id="timer">60s</div>
        <button onclick="resetTest()">Reset</button>
    </div>

    <div id="display">Loading code...</div>
    <textarea id="typing-input" placeholder="Start typing here to begin the timer..."></textarea>

    <script>
        const display = document.getElementById('display');
        const input = document.getElementById('typing-input');
        const lineSelect = document.getElementById('line-select');
        const timerDisplay = document.getElementById('timer');

        let timer;
        let timeLeft = 60;
        let isStarted = false;

        // 1. IMPROVEMENT: More diverse code snippets
        const codeBank = [
            "function init() { console.log('System Online'); }",
            "const data = fetch('api/v1/users').then(r => r.json());",
            "if (error) { throw new Error('Operation Failed'); }",
            "document.addEventListener('click', (e) => { e.preventDefault(); });",
            "export default class Controller { constructor() { this.state = {}; } }",
            "const sorted = arr.sort((a, b) => a - b);",
            "let result = await db.collection('logs').find({}).toArray();"
        ];

        function generateText() {
            const lineCount = parseInt(lineSelect.value);
            let content = [];
            // Fills the display based on chosen line count (15, 20, or 30)
            for (let i = 0; i < lineCount; i++) {
                let randomLine = codeBank[Math.floor(Math.random() * codeBank.length)];
                content.push(`${i + 1}  ${randomLine}`);
            }
            display.innerText = content.join('\n');
        }

        function startTimer() {
            if (isStarted) return;
            isStarted = true;
            
            timer = setInterval(() => {
                timeLeft--;
                timerDisplay.innerText = timeLeft + "s";

                if (timeLeft <= 0) {
                    finishTest();
                }
            }, 1000);
        }

        // 2. FIX: Disable input and Redirect
        function finishTest() {
            clearInterval(timer);
            input.disabled = true; // Stop them from typing

            // Calculate simple stats
            const words = input.value.trim().split(/\s+/).length;
            const wpm = Math.round((words / 60) * 60); // Simple WPM calc

            // Redirect to your Vercel results page with data in URL
            const resultsUrl = `https://website.vercel.com/results?wpm=${wpm}&lines=${lineSelect.value}`;
            
            // For testing purposes, we'll log it. Uncomment the line below for real use:
            // window.location.href = resultsUrl;
            alert("Test Over! Redirecting to results...");
            console.log("Redirecting to: " + resultsUrl);
        }

        function resetTest() {
            clearInterval(timer);
            isStarted = false;
            timeLeft = 60;
            timerDisplay.innerText = "60s";
            input.disabled = false;
            input.value = "";
            generateText();
        }

        // Event Listeners
        lineSelect.addEventListener('change', generateText);
        input.addEventListener('input', startTimer);

        // Initialize
        generateText();
    </script>
</body>
</html>
