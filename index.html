<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Applekour Community</title>
    <style>
        body { 
            margin: 0; 
            background-color: #000; 
            color: #fff; 
            font-family: 'Inter', sans-serif; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh;
        }

        .main-container {
            width: 100%;
            max-width: 700px; /* Делаем чуть компактнее для фокуса */
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        /* Рамка для видео с круглыми углами */
        .video-box {
            width: 100%;
            padding-top: 56.25%; /* Соотношение сторон 16:9 */
            position: relative;
            border-radius: 24px; /* Красивые круглые углы */
            overflow: hidden;
            background: #0a0a0a;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            margin-bottom: 30px;
        }

        .video-box iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }

        /* Стили формы */
        .submit-section {
            width: 100%;
            max-width: 380px;
            text-align: center;
        }

        h1 { font-size: 2.2rem; margin-bottom: 8px; letter-spacing: -1px; }
        p { color: #555; margin-bottom: 25px; font-size: 0.95rem; }

        .inputs { display: flex; flex-direction: column; gap: 10px; }
        
        input {
            background: #111;
            border: 1px solid #222;
            color: #fff;
            padding: 14px;
            border-radius: 12px;
            font-size: 1rem;
            transition: 0.2s;
        }

        input:focus { border-color: #555; outline: none; background: #151515; }

        button {
            background: #fff;
            color: #000;
            border: none;
            padding: 16px;
            border-radius: 12px;
            font-weight: 800;
            cursor: pointer;
            margin-top: 10px;
            transition: 0.3s;
        }

        button:hover { background: #ddd; transform: translateY(-2px); }
    </style>
</head>
<body>

    <div class="main-container">
        <div class="video-box">
            <iframe src="https://streamable.com/e/dosqic?autoplay=1&muted=1&nocontrols=1" allow="autoplay"></iframe>
        </div>

        <div class="submit-section">
            <h1>APPLEKOUR</h1>
            <p>Parkour Legacy Modded Community</p>
            
            <div class="inputs">
                <input type="text" id="nick" placeholder="In-game Nickname">
                <input type="text" id="discord" placeholder="Discord Link / ID">
                <input type="text" id="clip" placeholder="Clip Link">
                <button onclick="sendToDiscord()">Submit Trick</button>
            </div>
        </div>
    </div>

    <script>
        // Не забудь вставить свой Webhook URL
        const WEBHOOK_URL = "СЮДА_ВСТАВЬ_URL_ИЗ_ДИСКОРДА";

        function sendToDiscord() {
            const nick = document.getElementById('nick').value;
            const disc = document.getElementById('discord').value;
            const clip = document.getElementById('clip').value;

            if(!nick || !disc || !clip) return alert("Fill all fields!");

            const payload = {
                username: "Applekour Bot",
                embeds: [{
                    title: "🚀 New Clip Submitted!",
                    color: 0xffffff,
                    fields: [
                        { name: "Nickname", value: nick, inline: true },
                        { name: "Discord", value: disc, inline: true },
                        { name: "Link", value: clip }
                    ]
                }]
            };

            fetch(WEBHOOK_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            }).then(() => {
                alert("Clip sent to direct messages!");
            }).catch(err => {
                alert("Error sending clip.");
            });
        }
    </script>
</body>
</html>
