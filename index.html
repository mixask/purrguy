<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MonkeyCode | Multi-Lang Edition</title>
    <style>
        :root {
            --bg-color: #323437;
            --main-color: #e2b714;
            --sub-color: #646669;
            --text-color: #d1d0c5;
            --error-color: #ca4754;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Fira Code', 'Courier New', monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            transition: 0.3s;
        }

        /* Config Bar Styling */
        .config-bar {
            display: flex;
            gap: 25px;
            color: var(--sub-color);
            margin-bottom: 40px;
            font-size: 14px;
            user-select: none;
        }

        .config-group { display: flex; gap: 12px; align-items: center; }
        .config-group b { color: var(--main-color); text-transform: lowercase; }
        .opt { cursor: pointer; transition: 0.2s; }
        .opt:hover, .opt.active { color: var(--text-color); }
        .opt.active { color: var(--main-color); }

        /* Test Area */
        #test-container {
            width: 85%;
            max-width: 1000px;
            position: relative;
            outline: none;
        }

        #display-text {
            font-size: 22px;
            line-height: 1.6;
            color: var(--sub-color);
            white-space: pre-wrap;
            word-break: break-all;
        }

        .letter { position: relative; border-left: 2px solid transparent; }
        .letter.active { border-left-color: var(--main-color); animation: blink 1s infinite; }
        .letter.correct { color: var(--text-color); }
        .letter.incorrect { color: var(--error-color); }
        
        #hidden-input {
            position: absolute;
            top: 0; left: 0;
            opacity: 0;
            pointer-events: none;
        }

        /* Results Display */
        #results-screen { display: none; text-align: left; max-width: 400px; }
        .stat-box { margin-bottom: 20px; }
        .stat-val { font-size: 4rem; color: var(--main-color); margin: 0; line-height: 1; }
        .stat-label { color: var(--sub-color); font-size: 1.2rem; }

        .btn-row { display: flex; gap: 15px; margin-top: 30px; }
        .btn {
            background: none;
            border: 1px solid var(--sub-color);
            color: var(--sub-color);
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-family: inherit;
        }
        .btn:hover { background: var(--sub-color); color: var(--bg-color); }
        .btn.primary { border-color: var(--main-color); color: var(--main-color); }

        @keyframes blink { 50% { border-left-color: transparent; } }
    </style>
</head>
<body>

    <div class="config-bar" id="menu">
        <div class="config-group" id="lang-menu">
            <b>type</b>
            <span class="opt active" data-lang="en">english</span>
            <span class="opt" data-lang="ru">russian</span>
            <span class="opt" data-lang="js">javascript</span>
            <span class="opt" data-lang="lua">lua</span>
            <span class="opt" data-lang="py">python</span>
        </div>
        <div class="config-group" id="line-menu">
            <b>amount</b>
            <span class="opt" data-val="15">15</span>
            <span class="opt active" data-val="20">20</span>
            <span class="opt" data-val="30">30</span>
        </div>
        <div class="config-group">
            <b>time</b>
            <span id="timer" style="color: var(--main-color)">60</span>
        </div>
    </div>

    <div id="test-container">
        <textarea id="hidden-input" spellcheck="false" autocomplete="off"></textarea>
        <div id="display-text"></div>
    </div>

    <div id="results-screen">
        <div class="stat-box">
            <p class="stat-label">wpm</p>
            <h1 class="stat-val" id="res-wpm">0</h1>
        </div>
        <div class="stat-box">
            <p class="stat-label">accuracy</p>
            <h1 class="stat-val" id="res-acc" style="font-size: 2rem;">0%</h1>
        </div>
        <div class="btn-row">
            <button class="btn primary" onclick="location.reload()">restart test</button>
            <button class="btn" onclick="saveAsTxt()">save results</button>
        </div>
    </div>

<script>
    const contentPool = {
        en: ["The quick brown fox jumps over the lazy dog.", "Success is not final, failure is not fatal.", "Life is what happens when you're busy making other plans."],
        ru: ["Съешь же ещё этих мягких французских булок, да выпей чаю.", "В чащах юга жил бы цитрус, но фальшивый экземпляр.", "Я помню чудное мгновенье: передо мной явилась ты."],
        js: ["function init() {\n\tconsole.log('started');\n}", "const result = arr.map(x => x * 2);", "export default async function main() {\n\tawait run();\n}"],
        lua: ["local function greet(name)\n\tprint('Hello ' .. name)\nend", "if health <= 0 then\n\tprint('Game Over')\nend", "for i=1, 10 do\n\ttable.insert(t, i)\nend"],
        py: ["def calculate_area(r):\n\treturn 3.14 * r**2", "if __name__ == '__main__':\n\tmain()", "items = [x for x in range(10) if x % 2 == 0]"]
    };

    let activeLang = 'en';
    let lineCount = 20;
    let timeLeft = 60;
    let timer = null;
    let isStarted = false;
    let charIndex = 0;
    let mistakes = 0;

    const display = document.getElementById('display-text');
    const input = document.getElementById('hidden-input');
    const timerDisplay = document.getElementById('timer');

    function setupTest() {
        display.innerHTML = '';
        input.value = '';
        charIndex = 0;
        mistakes = 0;
        
        let rawContent = "";
        for(let i=0; i < lineCount; i++) {
            let pool = contentPool[activeLang];
            rawContent += pool[Math.floor(Math.random() * pool.length)] + (activeLang.length > 2 ? "\n" : " ");
        }

        rawContent.split('').forEach((char, i) => {
            const span = document.createElement('span');
            if (char === '\n') {
                span.innerHTML = '↵\n';
            } else if (char === '\t') {
                span.innerHTML = '&nbsp;&nbsp;&nbsp;&nbsp;';
            } else {
                span.innerText = char;
            }
            span.classList.add('letter');
            if(i === 0) span.classList.add('active');
            display.appendChild(span);
        });
    }

    input.addEventListener('keydown', (e) => {
        if (e.key === 'Tab') {
            e.preventDefault();
            const start = input.selectionStart;
            input.value = input.value.substring(0, start) + "\t" + input.value.substring(input.selectionEnd);
            input.selectionStart = input.selectionEnd = start + 1;
            handleInput();
        }
    });

    input.addEventListener('input', handleInput);

    function handleInput() {
        if (!isStarted) startTimer();
        
        const chars = display.querySelectorAll('.letter');
        const typedValue = input.value;

        // Check if backspaced
        if (typedValue.length < charIndex) {
            chars[charIndex].classList.remove('active', 'correct', 'incorrect');
            charIndex--;
            chars[charIndex].classList.add('active');
            chars[charIndex].classList.remove('correct', 'incorrect');
            return;
        }

        const currentChar = chars[charIndex];
        const lastTyped = typedValue[charIndex];
        
        // Normalize comparison for special chars
        const expected = currentChar.innerText.includes('↵') ? '\n' : (currentChar.innerText === '' ? '\t' : currentChar.innerText);

        currentChar.classList.remove('active');
        if (lastTyped === expected) {
            currentChar.classList.add('correct');
        } else {
            currentChar.classList.add('incorrect');
            mistakes++;
        }

        charIndex++;
        if (chars[charIndex]) {
            chars[charIndex].classList.add('active');
        } else {
            endTest();
        }
    }

    function startTimer() {
        isStarted = true;
        timer = setInterval(() => {
            timeLeft--;
            timerDisplay.innerText = timeLeft;
            if (timeLeft <= 0) endTest();
        }, 1000);
    }

    function endTest() {
        clearInterval(timer);
        input.disabled = true;
        
        // Calculate WPM & Accuracy
        const wpm = Math.round((charIndex / 5) / ((60 - timeLeft) / 60)) || 0;
        const acc = charIndex > 0 ? Math.round(((charIndex - mistakes) / charIndex) * 100) : 0;

        document.getElementById('menu').style.display = 'none';
        document.getElementById('test-container').style.display = 'none';
        document.getElementById('results-screen').style.display = 'block';
        
        document.getElementById('res-wpm').innerText = wpm;
        document.getElementById('res-acc').innerText = acc + "%";
    }

    function saveAsTxt() {
        const text = `MonkeyCode Results\nType: ${activeLang}\nWPM: ${document.getElementById('res-wpm').innerText}\nAccuracy: ${document.getElementById('res-acc').innerText}`;
        const blob = new Blob([text], {type: 'text/plain'});
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = 'typing-results.txt';
        a.click();
    }

    // Settings Listeners
    document.querySelectorAll('.opt').forEach(opt => {
        opt.onclick = () => {
            const group = opt.parentElement;
            group.querySelectorAll('.opt').forEach(o => o.classList.remove('active'));
            opt.classList.add('active');
            
            if(group.id === 'lang-menu') activeLang = opt.dataset.lang;
            if(group.id === 'line-menu') lineCount = parseInt(opt.dataset.val);
            
            setupTest();
        };
    });

    document.addEventListener('click', () => input.focus());
    setupTest();
</script>
</body>
</html>
