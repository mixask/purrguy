<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Applekour Community</title>
    <style>
        /* Общие настройки для темной темы */
        body { 
            margin: 0; 
            padding: 0; 
            background-color: #000; 
            color: #fff; 
            font-family: 'Inter', 'Segoe UI', sans-serif; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 800px;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        /* Видео в рамке с круглыми углами */
        .video-wrapper {
            width: 100%;
            aspect-ratio: 16 / 9;
            border-radius: 20px;
            overflow: hidden;
            background: #111;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            margin-bottom: 40px;
        }

        .video-wrapper iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        /* Форма под видео */
        .form-content {
            width: 100%;
            max-width: 400px;
        }

        h1 {
            font-size: 2.5rem;
            letter-spacing: -1px;
            margin-bottom: 10px;
        }

        p {
            color: #666;
            margin-bottom: 30px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        input {
            background: #111;
            border: 1px solid #222;
            color: #fff;
            padding: 15px;
            border-radius: 10px;
            font-size: 1rem;
            transition: 0.2s;
        }

        input:focus {
            border-color: #444;
            outline: none;
            background: #151515;
        }

        button {
            background: #fff;
            color: #000;
            border: none;
            padding: 16px;
            border-radius: 10px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 10px;
            transition: 0.3s;
            text-transform: uppercase;
        }

        button:hover {
            background: #ccc;
            transform: translateY(-2px);
        }

        /* Старый MonkeyCode остался без изменений в логике, 
           но если ты на Applekour — сработает этот стиль */
    </style>
</head>
<body class="apple-theme">

    <div class="container" id="apple-ui">
        <div class="video-wrapper">
            <iframe src="https://streamable.com/dosqic?autoplay=1&mute=1&controls=0&loop=1&playlist=ymH6T6oI1Sg" allow="autoplay"></iframe>
        </div>

        <div class="form-content">
            <h1>APPLEKOUR</h1>
            <p>Submit your community hard tricks</p>
            
            <div class="input-group">
                <input type="text" id="nick" placeholder="In-game Nickname">
                <input type="text" id="discord" placeholder="Discord Link or Tag">
                <input type="text" id="clip" placeholder="Clip Link (YT/Streamable)">
                <button onclick="sendToDiscord()">Submit Clip</button>
            </div>
        </div>
    </div>

    <script>
        // Проверка домена (как мы делали раньше)
        const host = window.location.hostname;
        if (!host.includes('applekour')) {
            // Если зашли не через applekour, можно редиректнуть 
            // или показать старый MonkeyCode через условие
        }

        function sendToDiscord() {
            const nick = document.getElementById('nick').value;
            const disc = document.getElementById('discord').value;
            const clip = document.getElementById('clip').value;

            if(!nick || !disc || !clip) {
                alert("Please fill all fields!");
                return;
            }

            // Тут будет логика бота
            alert("Ready to send! Setting up the bot next...");
        }
    </script>
</body>
</html>
