<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MonkeyCode | Final Edition</title>
    <style>
        :root {
            --bg-color: #323437;
            --main-color: #e2b714;
            --sub-color: #646669;
            --text-color: #d1d0c5;
            --error-color: #ca4754;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Fira Code', monospace;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        /* Central Container */
        .main-wrapper {
            width: 100%;
            max-width: 1100px;
            padding: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        /* Config Bar - Centered and Styled */
        .config-bar {
            display: flex;
            gap: 30px;
            color: var(--sub-color);
            margin-bottom: 60px;
            font-size: 14px;
            background: rgba(0, 0, 0, 0.15);
            padding: 12px 30px;
            border-radius: 12px;
            user-select: none;
            backdrop-filter: blur(5px);
        }

        .config-group { display: flex; gap: 12px; align-items: center; }
        .config-group b { color: var(--main-color); font-weight: normal; }
        .opt { cursor: pointer; transition: 0.2s; }
        .opt:hover, .opt.active { color: var(--text-color); }
        .opt.active { color: var(--main-color); }

        /* Test Area */
        #test-container {
            width: 100%;
            position: relative;
            min-height: 200px;
        }

        #display-text {
            font-size: 22px;
            line-height: 1.6;
            color: var(--sub-color);
            white-space: pre-wrap;
            word-break: break-word;
            text-align: left; /* Kept left for readability while centered in container */
            max-height: 50vh;
            overflow-y: hidden;
        }

        .letter { position: relative; border-left: 2px solid transparent; }
        .letter.active { border-left-color: var(--main-color); animation: blink 1s infinite; }
        .letter.correct { color: var(--text-color); }
        .letter.incorrect { color: var(--error-color); background: rgba(202, 71, 84, 0.1); }
        
        #hidden-input {
            position: absolute;
            top: 0; left: 0;
            opacity: 0;
            pointer-events: none;
        }

        /* Results Display */
        #results-screen { 
            display: none; 
            animation: fadeIn 0.4s ease forwards; 
        }
        
        .stat-val { font-size: 6rem; color: var(--main-color); margin: 0; line-height: 1; }
        .stat-label { color: var(--sub-color); font-size: 1.2rem; margin-bottom: 20px; text-transform: lowercase; }

        .btn-row { display: flex; gap: 20px; margin-top: 50px; justify-content: center; }
        .btn {
            background: none;
            border: 1px solid var(--sub-color);
            color: var(--sub-color);
            padding: 14px 28px;
            border-radius: 8px;
            cursor: pointer;
            font-family: inherit;
            font-size: 1rem;
            transition: 0.3s;
        }
        .btn:hover { background: var(--text-color); color: var(--bg-color); border-color: var(--text-color); }

        @keyframes blink { 50% { border-left-color: transparent; } }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
    </style>
</head>
<body>

    <div class="main-wrapper">
        <div class="config-bar" id="menu">
            <div class="config-group" id="lang-menu">
                <b>type</b>
                <span class="opt active" data-lang="en">english</span>
                <span class="opt" data-lang="ru">russian</span>
                <span class="opt" data-lang="js">javascript</span>
                <span class="opt" data-lang="py">python</span>
            </div>
            <div class="config-group" id="line-menu">
                <b>density</b>
                <span class="opt active" data-val="15">low</span>
                <span class="opt" data-val="30">med</span>
                <span class="opt" data-val="50">high</span>
            </div>
            <div class="config-group" id="time-menu">
                <b>time</b>
                <span class="opt" data-time="15">15</span>
                <span class="opt" data-time="30">30</span>
                <span class="opt active" data-time="60">60</span>
            </div>
        </div>

        <div id="test-container">
            <div id="timer-live" style="color: var(--main-color); font-size: 1.8rem; margin-bottom: 20px; height: 30px; visibility: hidden;">60</div>
            <textarea id="hidden-input" spellcheck="false" autocomplete="off"></textarea>
            <div id="display-text"></div>
        </div>

        <div id="results-screen">
            <div>
                <p class="stat-label">wpm</p>
                <h1 class="stat-val" id="res-wpm">0</h1>
            </div>
            <div style="margin-top: 20px;">
                <p class="stat-label">accuracy</p>
                <h1 class="stat-val" id="res-acc" style="font-size: 3rem;">0%</h1>
            </div>
            <div class="btn-row">
                <button class="btn" onclick="location.reload()">restart test</button>
                <button class="btn" onclick="saveAsTxt()">save results</button>
            </div>
        </div>
    </div>

<script>
    const contentPool = {
        en: ["Focus on the journey, not the destination.", "Clean code always looks like it was written by someone who cares.", "The best way to predict the future is to invent it.", "Software is a great combination between artistry and engineering.", "Simplicity is the soul of efficiency.", "Talk is cheap. Show me the code.", "Stay hungry, stay foolish."],
        ru: ["Программирование — это способ думать о вещах.", "Код должен быть понятен человеку, а не только машине.", "Семь раз отмерь, один раз отрежь.", "Ученье — свет, а неученье — тьма.", "Сложность — это враг надежности.", "Пишите код так, будто сопровождать его будет маньяк-психопат."],
        js: ["const root = ReactDOM.createRoot(document.getElementById('root'));", "app.get('/', (req, res) => res.send('Hello World'));", "const result = data.filter(item => item.active).map(i => i.id);", "async function fetchData() { const res = await fetch(url); }", "setTimeout(() => { window.location.reload(); }, 1000);"],
        py: ["def calculate_bmi(weight, height):\n    return weight / (height ** 2)", "print(f'Hello, {user_name}!')", "list_comp = [x for x in data if x > 10]", "import matplotlib.pyplot as plt\nplt.plot(x, y)\nplt.show()", "with open('config.json') as file:\n    data = json.load(file)"]
    };

    let activeLang = 'en', lineCount = 15, maxTime = 60, timeLeft = 60;
    let timer = null, isStarted = false, charIndex = 0, mistakes = 0;

    const display = document.getElementById('display-text');
    const input = document.getElementById('hidden-input');
    const timerLive = document.getElementById('timer-live');

    function setupTest() {
        display.innerHTML = '';
        input.value = '';
        charIndex = 0;
        mistakes = 0;
        isStarted = false;
        clearInterval(timer);
        timeLeft = maxTime;
        timerLive.innerText = timeLeft;
        timerLive.style.visibility = 'hidden';
        
        let rawContent = "";
        let totalPhrases = activeLang.length > 2 ? lineCount : lineCount * 4; 

        for(let i=0; i < totalPhrases; i++) {
            let pool = contentPool[activeLang];
            let phrase = pool[Math.floor(Math.random() * pool.length)];
            rawContent += phrase + (activeLang.length > 2 ? "\n\n" : " ");
        }

        rawContent.split('').forEach((char, i) => {
            const span = document.createElement('span');
            if (char === '\n') span.innerHTML = '↵\n';
            else if (char === '\t') span.innerHTML = '&nbsp;&nbsp;&nbsp;&nbsp;';
            else span.innerText = char;
            span.classList.add('letter');
            if(i === 0) span.classList.add('active');
            display.appendChild(span);
        });
    }

    input.addEventListener('input', () => {
        if (!isStarted) startTimer();
        
        const chars = display.querySelectorAll('.letter');
        const typedVal = input.value;
        
        if (typedVal.length < charIndex) {
            chars[charIndex].classList.remove('active', 'correct', 'incorrect');
            charIndex = typedVal.length;
            chars[charIndex].classList.add('active');
            chars[charIndex].classList.remove('correct', 'incorrect');
            return;
        }

        const currentChar = chars[charIndex];
        const lastTyped = typedVal[charIndex];
        const expected = currentChar.innerText.includes('↵') ? '\n' : (currentChar.innerText === '' ? '\t' : currentChar.innerText);

        currentChar.classList.remove('active');
        if (lastTyped === expected) {
            currentChar.classList.add('correct');
        } else {
            currentChar.classList.add('incorrect');
            mistakes++;
        }

        charIndex++;
        if (chars[charIndex]) {
            chars[charIndex].classList.add('active');
        } else {
            endTest();
        }
    });

    function startTimer() {
        isStarted = true;
        timerLive.style.visibility = 'visible';
        timer = setInterval(() => {
            timeLeft--;
            timerLive.innerText = timeLeft;
            if (timeLeft <= 0) endTest();
        }, 1000);
    }

    function endTest() {
        clearInterval(timer);
        input.disabled = true;
        const timeSpent = Math.max(1, maxTime - timeLeft);
        const wpm = Math.round((charIndex / 5) / (timeSpent / 60));
        const acc = charIndex > 0 ? Math.round(((charIndex - mistakes) / charIndex) * 100) : 0;

        document.getElementById('menu').style.display = 'none';
        document.getElementById('test-container').style.display = 'none';
        document.getElementById('results-screen').style.display = 'block';
        
        document.getElementById('res-wpm').innerText = wpm;
        document.getElementById('res-acc').innerText = acc + "%";
    }

    function saveAsTxt() {
        const text = `MonkeyCode Results\nWPM: ${document.getElementById('res-wpm').innerText}\nAccuracy: ${document.getElementById('res-acc').innerText}`;
        const blob = new Blob([text], {type: 'text/plain'});
        const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
        a.download = 'score.txt'; a.click();
    }

    document.querySelectorAll('.opt').forEach(opt => {
        opt.onclick = () => {
            const group = opt.parentElement;
            group.querySelectorAll('.opt').forEach(o => o.classList.remove('active'));
            opt.classList.add('active');
            
            if(group.id === 'lang-menu') activeLang = opt.dataset.lang;
            if(group.id === 'line-menu') lineCount = parseInt(opt.dataset.val);
            if(group.id === 'time-menu') {
                maxTime = parseInt(opt.dataset.time);
                timeLeft = maxTime;
            }
            setupTest();
        };
    });

    document.addEventListener('click', () => input.focus());
    setupTest();
</script>
</body>
</html>
